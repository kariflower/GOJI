  function buildCopyText(kind, clip) {
    if (kind === "prompt") return (clip.prompt || "") + (clip.negative_prompt ? "\n\nNEGATIVE: " + clip.negative_prompt : "");
    if (kind === "payload") return JSON.stringify(clip.request_payload || clip, null, 2);
    if (kind === "refs") return Object.entries(clip.references || {}).filter(([,v])=>v).map(([k,v])=>k+": "+v).join("\n") || "No references";
    if (kind === "timeline") return clip.timeline_yaml || JSON.stringify(clip.timeline || {}, null, 2);
    if (kind === "all") return ["PROMPT", buildCopyText("prompt",clip), "\nPAYLOAD", buildCopyText("payload",clip), "\nREFERENCES", buildCopyText("refs",clip), "\nTIMELINE", buildCopyText("timeline",clip)].join("\n");
    return "";
  }

  /* ================================================================
     CREDITS PAGE
     ================================================================ */
  function _winnerProposalForPhase(phaseKey) {
    const cd = (competitionData && typeof competitionData === "object") ? competitionData[phaseKey] : null;
    if (!cd || typeof cd !== "object") return null;
    _annotateCompetitionWinnersInPlace(cd);
    const proposals = Array.isArray(cd.proposals) ? cd.proposals : [];
    if (!proposals.length) return null;
    const byFlag = proposals.find(p => p && typeof p === "object" && p.is_winner);
    if (byFlag) return byFlag;
    const voting = (cd.voting && typeof cd.voting === "object")
      ? cd.voting
      : ((cd.vote && typeof cd.vote === "object") ? cd.vote : {});
    const winnerKey = String(_resolveCompetitionWinnerKey(voting) || cd.winner_candidate_key || "").trim();
    const winnerProposalId = String(cd.winner_proposal_id || "").trim();
    if (winnerProposalId) {
      const byId = proposals.find(p => p && typeof p === "object" && String(p.proposal_id || "").trim() === winnerProposalId);
      if (byId) return byId;
    }
    if (winnerKey) {
      const candidateMap = (voting && voting.candidate_map && typeof voting.candidate_map === "object")
        ? voting.candidate_map
        : {};
      const mappedProposalId = String(candidateMap[winnerKey] || "").trim();
      if (mappedProposalId) {
        const byMap = proposals.find(p => p && typeof p === "object" && String(p.proposal_id || "").trim() === mappedProposalId);
        if (byMap) return byMap;
      }
      const alpha = winnerKey.toUpperCase();
      if (/^[A-Z]$/.test(alpha)) {
        const idx = alpha.charCodeAt(0) - 65;
        if (idx >= 0 && idx < proposals.length) {
          const byIndex = proposals[idx];
          if (byIndex && typeof byIndex === "object") return byIndex;
        }
      }
      const byDirectId = proposals.find(p => p && typeof p === "object" && String(p.proposal_id || "").trim() === winnerKey);
      if (byDirectId) return byDirectId;
    }
    return null;
  }

  function renderCredits() {
    const el = document.getElementById("credits-content");
    if (!el) return;
    const L = (ja, en) => (lang === "ja" ? ja : en);

    const sessionId = resolveSessionIdForEntryGate() || "default";
    const artistStorageKey = `mv-credits-artist-${sessionId}`;
    const artistName = String(localStorage.getItem(artistStorageKey) || "").trim();
    const songTitle = String((creditsData && creditsData.song_title) || "").trim() || L("未設定", "Untitled");

    const roleDefs = [
      { roleJa: "原案（テーマ）", roleEn: "Theme Origin", phases: ["phase1"] },
      { roleJa: "キャラクター原案", roleEn: "Character Origin", phases: ["phase2a", "phase2"] },
      { roleJa: "世界観原案", roleEn: "World Origin", phases: ["phase3"] },
      { roleJa: "ストーリーライン（あらすじ）", roleEn: "Storyline (Synopsis)", phases: ["phase4a", "phase4"] },
    ];

    const roleRows = [];
    const winnerKeySet = new Set();
    roleDefs.forEach(def => {
      let winnerProposal = null;
      def.phases.some(pk => {
        winnerProposal = _winnerProposalForPhase(pk);
        return !!winnerProposal;
      });
      const pm = winnerProposal ? proposalPersonaMeta(winnerProposal) : null;
      const winnerName = pm ? (pm.personaName || "-") : "-";
      const winnerKey = pm ? (pm.personaId || pm.personaName || "") : "";
      if (winnerKey) winnerKeySet.add(winnerKey);
      roleRows.push({
        roleLabel: L(def.roleJa, def.roleEn),
        winnerName,
      });
    });

    const participantMap = new Map();
    Object.entries(competitionData || {}).forEach(([phaseKey, payload]) => {
      if (!/^phase/i.test(String(phaseKey || ""))) return;
      if (!payload || typeof payload !== "object") return;
      const proposals = Array.isArray(payload.proposals) ? payload.proposals : [];
      proposals.forEach(p => {
        if (!p || typeof p !== "object") return;
        const pm = proposalPersonaMeta(p);
        const key = pm.personaId || pm.personaName || "";
        if (!key) return;
        if (!participantMap.has(key)) {
          participantMap.set(key, {
            key,
            personaId: pm.personaId || "",
            personaName: pm.personaName || key,
            portraitUrl: pm.portraitUrl || "",
            personaStatus: pm.personaStatus || "",
            profile: (pm.profile && typeof pm.profile === "object") ? pm.profile : {},
            phases: new Set(),
          });
        }
        const row = participantMap.get(key);
        row.phases.add(String(phaseKey).toUpperCase());
        if (!row.portraitUrl && pm.portraitUrl) row.portraitUrl = pm.portraitUrl;
        if (!row.personaStatus && pm.personaStatus) row.personaStatus = pm.personaStatus;
        if ((!row.profile || !Object.keys(row.profile).length) && pm.profile && Object.keys(pm.profile).length) {
          row.profile = pm.profile;
        }
      });
    });

    const participants = Array.from(participantMap.values()).sort((a, b) =>
      String(a.personaName || "").localeCompare(String(b.personaName || ""), "ja")
    );
    const supporters = participants
      .filter(p => !winnerKeySet.has(p.key))
      .map(p => p.personaName)
      .filter(Boolean);

    let html = "";
    html += `<div class="card">
      <div class="card-title">${esc(L("エンドクレジット", "End Credits"))}</div>
      <div class="bp-kv">
        <div class="bp-kv-label">${esc(L("楽曲名", "Song Title"))}</div>
        <div class="bp-kv-value">${esc(songTitle)}</div>
      </div>
      <div class="bp-kv">
        <div class="bp-kv-label">${esc(L("アーティスト名（入力）", "Artist Name (Input)"))}</div>
        <input id="credits-artist-input" class="filter-search" style="margin-top:6px;max-width:360px" placeholder="${esc(L("ここに入力", "Type here"))}" value="${esc(artistName)}" />
        <div class="bp-kv-value" style="margin-top:6px"><span style="color:var(--muted)">${esc(L("表示値", "Display"))}:</span> <span id="credits-artist-value">${esc(artistName || "-")}</span></div>
      </div>
      <ul class="dsl-list" style="margin-top:10px">
        ${roleRows.map(r => `<li><span class="dsl-key">${esc(r.roleLabel)}</span><span class="dsl-val">${esc(r.winnerName || "-")}</span></li>`).join("")}
        <li><span class="dsl-key">${esc(L("制作協力", "Production Support"))}</span><span class="dsl-val">${esc(supporters.join(", ") || "-")}</span></li>
      </ul>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="copy-btn" id="credits-copy-btn">${esc(L("クレジットをコピー", "Copy Credits"))}</button>
      </div>
    </div>`;

    html += `<div class="card" style="margin-top:14px">
      <div class="card-title">${esc(L("参加ペルソナ一覧", "All Participating Personas"))} (${participants.length})</div>`;
    if (!participants.length) {
      html += `<div style="font-size:12px;color:var(--muted)">${esc(t("noData"))}</div>`;
    } else {
      html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px">`;
      participants.forEach(p => {
        const profile = (p.profile && typeof p.profile === "object") ? p.profile : {};
        const birthdate = String(profile.birthdate || "").trim();
        const originCity = String(profile.origin_city || "").trim();
        const phases = Array.from(p.phases || []).sort().join(", ");
        html += `<div class="outline-card credits-persona-card" data-persona-key="${esc(p.key)}" style="margin-bottom:0;cursor:pointer" title="${esc(L("クリックで詳細", "Click for details"))}">
          <div style="display:flex;align-items:center;gap:10px">
            ${p.portraitUrl
              ? `<img src="${esc(p.portraitUrl)}" alt="" style="width:52px;height:52px;border-radius:10px;object-fit:cover;border:1px solid var(--border-default)" loading="lazy" onerror="this.style.display='none'">`
              : `<div style="width:52px;height:52px;border-radius:10px;border:1px solid var(--border-default);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px">${esc(L("画像なし", "No Image"))}</div>`}
            <div style="min-width:0;flex:1">
              <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.personaName || p.personaId || "-")}</div>
              <div style="font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(phases)}</div>
            </div>
          </div>
          ${birthdate ? `<div style="margin-top:8px;font-size:11px"><span style="color:var(--muted)">${esc(L("誕生日", "Birthdate"))}:</span> ${esc(birthdate)}</div>` : ""}
          ${originCity ? `<div style="margin-top:4px;font-size:11px;color:var(--muted)">${esc(lang === "ja" ? `${originCity}出身` : `From ${originCity}`)}</div>` : ""}
          <div style="margin-top:6px;font-size:10px;color:var(--dim)">${esc(L("クリックで詳細", "Click for details"))}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;

    el.innerHTML = html;

    const artistInput = document.getElementById("credits-artist-input");
    const artistValue = document.getElementById("credits-artist-value");
    if (artistInput) {
      artistInput.addEventListener("input", () => {
        const v = String(artistInput.value || "").trim();
        localStorage.setItem(artistStorageKey, v);
        if (artistValue) artistValue.textContent = v || "-";
      });
    }

    const participantByKey = new Map(participants.map(p => [p.key, p]));
    el.querySelectorAll(".credits-persona-card").forEach(card => {
      card.addEventListener("click", () => {
        const key = String(card.getAttribute("data-persona-key") || "").trim();
        const participant = participantByKey.get(key);
        if (!participant) return;
        renderPersonaDrawerFromCreditParticipant({
          ...participant,
          phases: Array.from(participant.phases || []),
        });
        openDrawer();
      });
    });

    const copyBtn = document.getElementById("credits-copy-btn");
    if (copyBtn) {
      copyBtn.addEventListener("click", () => {
        const lines = [];
        lines.push("END CREDITS");
        lines.push(`MUSIC: ${songTitle}`);
        lines.push(`ARTIST: ${String(localStorage.getItem(artistStorageKey) || "").trim() || "-"}`);
        roleRows.forEach(r => lines.push(`${r.roleLabel}: ${r.winnerName || "-"}`));
        lines.push(`${L("制作協力", "Production Support")}: ${supporters.join(", ") || "-"}`);
        lines.push(`${L("参加ペルソナ", "Participating Personas")}: ${participants.map(p => p.personaName).filter(Boolean).join(", ") || "-"}`);
        copyText(lines.join("\n"));
      });
    }
  }

  /* ================================================================
     SETTINGS PAGE
     ================================================================ */
  function buildSettingsDiagnostics() {
    const totalDur = Number(timeline.duration_sec || 0);
    const phaseOrder = ["phase1", "phase2a", "phase3", "phase4a", "phase4"];
    const competitionPhases = phaseOrder
      .map(phase => {
        const cd = competitionData && typeof competitionData === "object" ? competitionData[phase] : null;
        if (!cd || typeof cd !== "object") return null;
        const proposals = Array.isArray(cd.proposals) ? cd.proposals : [];
        const voting = (cd.voting && typeof cd.voting === "object")
          ? cd.voting
          : ((cd.vote && typeof cd.vote === "object") ? cd.vote : {});
        const votes = _extractCompetitionVotes(voting);
        const profileCount = proposals.filter(p => p && typeof p === "object" && p.persona_profile && Object.keys(p.persona_profile).length > 0).length;
        const portraitCount = proposals.filter(p => !!proposalPersonaMeta(p).portraitUrl).length;
        const statusCount = proposals.filter(p => !!proposalPersonaMeta(p).personaStatus).length;
        const winner = _resolveCompetitionWinnerKey(voting);
        return {
          phase,
          proposals: proposals.length,
          votes: votes.length,
          profile_count: profileCount,
          portrait_count: portraitCount,
          status_count: statusCount,
          winner: winner || "",
        };
      })
      .filter(Boolean);

    return {
      session_id: (competitionData && competitionData.session_id) || "",
      generated_at: meta.generated_at || "",
      clip_count: clips.length,

  }

  async function copySettingsDiagnostics() {
    const payload = buildSettingsDiagnostics();

    location.href = "../../../index.html";

  function renderSettings() {
    const el = document.getElementById("settings-content");

    const L = (ja, en) => (lang === "ja" ? ja : en);
    const cache = diag.media_cache || {};
    const phaseRows = (diag.competition_phases || []).map(row => {
      const phaseLabel = String(row.phase || "").toUpperCase();
      const winner = row.winner ? esc(row.winner) : "-";
      return `<div class="vote-bar-row" style="margin-top:6px">
        <div class="vote-bar-label">${esc(phaseLabel)}</div>
        <div class="vote-bar-track" style="padding:0 8px;color:var(--muted);font-size:10px;display:flex;align-items:center;gap:10px">

        </div>
        <div class="vote-bar-count">${winner}</div>
      </div>`;
    }).join("");

    el.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-value">${esc(String(diag.clip_count))}</div><div class="stat-label">${esc(L("クリップ", "Clips"))}</div></div>
        <div class="stat-card"><div class="stat-value">${esc(fmtTime(diag.duration_sec || 0))}</div><div class="stat-label">${esc(L("尺", "Duration"))}</div></div>
        <div class="stat-card"><div class="stat-value">${esc(String(diag.sections))}</div><div class="stat-label">${esc(L("セクション", "Sections"))}</div></div>
        <div class="stat-card"><div class="stat-value">${esc(String(diag.key_clips))}</div><div class="stat-label">${esc(L("キークリップ", "Key Clips"))}</div></div>
      </div>

        <div class="grammar-item">
          <h4>${esc(L("セッション情報", "Session Info"))}</h4>

            <li><span class="dsl-key">generated_at</span><span class="dsl-val">${esc(diag.generated_at || "-")}</span></li>
            <li><span class="dsl-key">hook_curve_source</span><span class="dsl-val">${esc(diag.hook_curve_source || "-")}</span></li>

  window._setLang = setLang;
  window._downloadJson = function() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });

     KEYBOARD SHORTCUTS

  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") {
      if (e.key === "Escape") { e.target.blur(); e.preventDefault(); }
      return;
    }
    if (e.key === "Escape") { closeDrawer(); return; }
    if (e.key === "/") { e.preventDefault(); const s = document.getElementById("f-search"); if (s) { navigate("clips"); s.focus(); } return; }
    if (e.key === "c" && activeClipId) { const c = clipMap.get(activeClipId); if (c) copyText(buildCopyText("prompt", c)); return; }
    if (e.key >= "1" && e.key <= "8") { const p = PAGES[parseInt(e.key)-1]; if (p) location.hash = p; return; }
    if ((e.key === "ArrowRight" || e.key === "j") && currentPage === "clips") { navigateClip(1); return; }
    if ((e.key === "ArrowLeft" || e.key === "k") && currentPage === "clips") { navigateClip(-1); return; }
  });

  function navigateClip(dir) {
    if (!filteredClips.length) return;
    const idx = filteredClips.findIndex(c => c.clip_id === activeClipId);
    const next = Math.max(0, Math.min(filteredClips.length - 1, (idx < 0 ? 0 : idx) + dir));
    selectClip(filteredClips[next].clip_id);
    const card = document.querySelector(`.clip-card[data-clip-id="${filteredClips[next].clip_id}"]`);
    if (card) card.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }

  /* ================================================================
     TOPBAR
     ================================================================ */
  function renderTopBar() {
    const sessionEl = document.getElementById("topbar-session");
    sessionEl.textContent = meta.generated_at ? meta.generated_at.split("T")[0] : "";
    const statsEl = document.getElementById("topbar-stats");
    const totalDur = timeline.duration_sec || 0;
    statsEl.innerHTML = `
      <div class="topbar-stat"><b>${clips.length}</b> ${t("clips")}</div>
      <div class="topbar-stat"><b>${fmtTime(totalDur)}</b></div>
      <div class="topbar-stat"><b>${sections.length}</b> ${t("secs")}</div>
    `;
  }

  /* ================================================================
     INIT
     ================================================================ */
  ensureSessionEntryGate();

  const renderers = {
    overview: renderOverview,
    blueprint: renderBlueprint,
    visuals: renderVisualConcepts,
    pipeline: renderPipeline,
    timeline: renderTimeline,
    clips: renderClips,
    credits: renderCredits,
    settings: renderSettings,
  };

  // Lang buttons in topbar
  document.querySelectorAll(".topbar-right .lang-btn").forEach(b => b.onclick = () => setLang(b.dataset.lang));

  // Drawer scrim
  document.getElementById("drawer-scrim").addEventListener("click", closeDrawer);

  // Initial render
  renderTopBar();
  const initPage = location.hash.replace("#","") || "clips";
  navigate(initPage);

  })();
  </script>
