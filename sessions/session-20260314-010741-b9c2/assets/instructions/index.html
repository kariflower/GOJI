        <div class="vote-bar-label">${esc(phaseLabel)}</div>
        <div class="vote-bar-track" style="padding:0 8px;color:var(--muted);font-size:10px;display:flex;align-items:center;gap:10px">
          <span>P:${row.proposals}</span>
          <span>V:${row.votes}</span>
          <span>Profile:${row.profile_count}/${row.proposals}</span>
          <span>Portrait:${row.portrait_count}/${row.proposals}</span>
          <span>Status:${row.status_count}/${row.proposals}</span>
        </div>
        <div class="vote-bar-count">${winner}</div>
      </div>`;
    }).join("");

    el.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-value">${esc(String(diag.clip_count))}</div><div class="stat-label">${esc(L("クリップ", "Clips"))}</div></div>
        <div class="stat-card"><div class="stat-value">${esc(fmtTime(diag.duration_sec || 0))}</div><div class="stat-label">${esc(L("尺", "Duration"))}</div></div>
        <div class="stat-card"><div class="stat-value">${esc(String(diag.sections))}</div><div class="stat-label">${esc(L("セクション", "Sections"))}</div></div>
        <div class="stat-card"><div class="stat-value">${esc(String(diag.key_clips))}</div><div class="stat-label">${esc(L("キークリップ", "Key Clips"))}</div></div>
      </div>

      <div class="grammar-grid" style="margin-top:14px">
        <div class="grammar-item">
          <h4>${esc(L("セッション情報", "Session Info"))}</h4>
          <ul class="dsl-list">
            <li><span class="dsl-key">session_id</span><span class="dsl-val">${esc(diag.session_id || "-")}</span></li>
            <li><span class="dsl-key">generated_at</span><span class="dsl-val">${esc(diag.generated_at || "-")}</span></li>
            <li><span class="dsl-key">hook_curve_source</span><span class="dsl-val">${esc(diag.hook_curve_source || "-")}</span></li>
            <li><span class="dsl-key">cache_media</span><span class="dsl-val">${esc(String(!!cache.enabled))}</span></li>
            <li><span class="dsl-key">cache_remote</span><span class="dsl-val">${esc(String(!!cache.cache_remote))}</span></li>
            <li><span class="dsl-key">cache_video</span><span class="dsl-val">${esc(String(!!cache.cache_video))}</span></li>
          </ul>
        </div>
        <div class="grammar-item">
          <h4>${esc(L("コンペ健全性", "Competition Health"))}</h4>
          ${phaseRows || `<div style="font-size:12px;color:var(--muted)">${esc(L("コンペデータなし", "No competition data"))}</div>`}
        </div>
      </div>

      <div class="bp-kv" style="margin-top:16px">
        <div class="bp-kv-label">${esc(L("表示言語", "Language"))}</div>
        <div style="margin-top:6px">
          <button class="lang-btn${lang==="en"?" active":""}" id="settings-lang-en">English</button>
          <button class="lang-btn${lang==="ja"?" active":""}" id="settings-lang-ja">日本語</button>
        </div>
      </div>

      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">
        <button class="copy-btn" id="settings-download">${esc(L("JSONダウンロード", "Download JSON"))}</button>
        <button class="copy-btn" id="settings-copy-diag">${esc(L("診断JSONをコピー", "Copy diagnostics"))}</button>
        <button class="copy-btn" id="settings-open-hub">${esc(L("セッション一覧へ", "Open session hub"))}</button>
        <button class="copy-btn" id="settings-reload">${esc(L("再読み込み", "Reload"))}</button>
      </div>

      <div class="bp-kv" style="margin-top:16px">
        <div class="bp-kv-label">${esc(L("ショートカット", "Shortcuts"))}</div>
        <ul class="bp-list" style="margin-top:6px">
          <li><b>/</b> ${esc(L("クリップ検索へフォーカス", "Focus clip search"))}</li>
          <li><b>1-8</b> ${esc(L("ページ切替", "Switch pages"))}</li>
          <li><b>j / k</b> ${esc(L("クリップ移動", "Next / prev clip"))}</li>
          <li><b>c</b> ${esc(L("選択クリップのプロンプトをコピー", "Copy selected clip prompt"))}</li>
          <li><b>Esc</b> ${esc(L("ドロワーを閉じる", "Close drawer"))}</li>
        </ul>
      </div>
    `;

    const enBtn = document.getElementById("settings-lang-en");
    const jaBtn = document.getElementById("settings-lang-ja");
    const dlBtn = document.getElementById("settings-download");
    const cpBtn = document.getElementById("settings-copy-diag");
    const hubBtn = document.getElementById("settings-open-hub");
    const reloadBtn = document.getElementById("settings-reload");
    if (enBtn) enBtn.onclick = () => setLang("en");
    if (jaBtn) jaBtn.onclick = () => setLang("ja");
    if (dlBtn) dlBtn.onclick = () => window._downloadJson();
    if (cpBtn) cpBtn.onclick = () => { void copySettingsDiagnostics(); };
    if (hubBtn) hubBtn.onclick = () => openSessionHub();
    if (reloadBtn) reloadBtn.onclick = () => location.reload();
  }
  window._setLang = setLang;
  window._downloadJson = function() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "instructions_data.json"; a.click();
    URL.revokeObjectURL(url);
  };

  /* ================================================================
     KEYBOARD SHORTCUTS
     ================================================================ */
  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") {
      if (e.key === "Escape") { e.target.blur(); e.preventDefault(); }
      return;
    }
    if (e.key === "Escape") { closeDrawer(); return; }
    if (e.key === "/") { e.preventDefault(); const s = document.getElementById("f-search"); if (s) { navigate("clips"); s.focus(); } return; }
    if (e.key === "c" && activeClipId) { const c = clipMap.get(activeClipId); if (c) copyText(buildCopyText("prompt", c)); return; }
    if (e.key >= "1" && e.key <= "8") { const p = PAGES[parseInt(e.key)-1]; if (p) location.hash = p; return; }
    if ((e.key === "ArrowRight" || e.key === "j") && currentPage === "clips") { navigateClip(1); return; }
    if ((e.key === "ArrowLeft" || e.key === "k") && currentPage === "clips") { navigateClip(-1); return; }
  });

  function navigateClip(dir) {
    if (!filteredClips.length) return;
    const idx = filteredClips.findIndex(c => c.clip_id === activeClipId);
    const next = Math.max(0, Math.min(filteredClips.length - 1, (idx < 0 ? 0 : idx) + dir));
    selectClip(filteredClips[next].clip_id);
    const card = document.querySelector(`.clip-card[data-clip-id="${filteredClips[next].clip_id}"]`);
    if (card) card.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }

  /* ================================================================
     TOPBAR
     ================================================================ */
  function renderTopBar() {
    const sessionEl = document.getElementById("topbar-session");
    sessionEl.textContent = meta.generated_at ? meta.generated_at.split("T")[0] : "";
    const statsEl = document.getElementById("topbar-stats");
    const totalDur = timeline.duration_sec || 0;
    statsEl.innerHTML = `
      <div class="topbar-stat"><b>${clips.length}</b> ${t("clips")}</div>
      <div class="topbar-stat"><b>${fmtTime(totalDur)}</b></div>
      <div class="topbar-stat"><b>${sections.length}</b> ${t("secs")}</div>
    `;
  }

  /* ================================================================
     INIT
     ================================================================ */
  ensureSessionEntryGate();

  const renderers = {
    overview: renderOverview,
    blueprint: renderBlueprint,
    visuals: renderVisualConcepts,
    pipeline: renderPipeline,
    timeline: renderTimeline,
    clips: renderClips,
    credits: renderCredits,
    settings: renderSettings,
  };

  // Lang buttons in topbar
  document.querySelectorAll(".topbar-right .lang-btn").forEach(b => b.onclick = () => setLang(b.dataset.lang));

  // Drawer scrim
  document.getElementById("drawer-scrim").addEventListener("click", closeDrawer);

  // Initial render
  renderTopBar();
  const initPage = location.hash.replace("#","") || "clips";
  navigate(initPage);

  })();
  </script>
</body>
</html>
