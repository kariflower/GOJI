<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MV Instruction Timeline</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap");

    /* ── Variables ─────────────────────────────────── */
    :root {
      --bg-base: #0a0b0e;
      --bg-surface: #111318;
      --bg-raised: #191b22;
      --bg-overlay: #21232c;
      --ink: #ece9e3;
      --ink-secondary: #c4bfb7;
      --muted: #8a847d;
      --dim: #58524b;
      --accent: #ff6b35;
      --accent-glow: rgba(255, 107, 53, 0.15);
      --accent-2: #4ea8d1;
      --accent-3: #f4b942;
      --green: #34d399;
      --red: #f87171;
      --purple: #c084fc;
      --panel: rgba(17, 19, 24, 0.82);
      --panel-strong: rgba(25, 27, 34, 0.94);
      --line: rgba(255, 255, 255, 0.08);
      --border-subtle: rgba(255, 255, 255, 0.05);
      --border-default: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.14);
      --shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-glow: 0 0 20px rgba(255, 107, 53, 0.08);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --mono: "JetBrains Mono", "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
      --nav-w: 60px;
      --nav-w-open: 210px;
      --topbar-h: 52px;
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── Reset ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Sora", "Helvetica Neue", -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink);
      background:
        radial-gradient(ellipse at 10% 15%, rgba(255,107,53,0.04), transparent 40%),
        radial-gradient(ellipse at 85% 5%, rgba(78,168,209,0.03), transparent 35%),
        radial-gradient(ellipse at 50% 80%, rgba(192,132,252,0.02), transparent 40%),
        var(--bg-base);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: var(--accent-2); text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1,h2,h3,h4,h5 { margin: 0; font-family: "Unbounded","Sora",sans-serif; letter-spacing: -0.01em; }
    ::selection { background: rgba(255,107,53,0.3); color: #fff; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

    /* ── TopBar ─────────────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: var(--nav-w); right: 0;
      height: var(--topbar-h);
      background: var(--panel-strong);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      transition: left 0.3s var(--ease-out-expo);
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; }
    .topbar-session { font-size: 10px; color: var(--dim); font-family: var(--mono); letter-spacing: 0.02em; }
    .topbar-stats { display: flex; gap: 20px; }
    .topbar-stat {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--muted);
    }
    .topbar-stat b { color: var(--ink); font-weight: 700; font-size: 13px; }
    .topbar-right { display: flex; align-items: center; gap: 6px; }
    .lang-btn {
      background: none; border: 1px solid var(--border-default); color: var(--muted);
      padding: 5px 12px; border-radius: 999px; font-size: 10px; cursor: pointer;
      transition: all 0.2s var(--ease-out-expo);
      font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .lang-btn:hover { border-color: var(--border-strong); color: var(--ink); }
    .lang-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(255,107,53,0.3); }

    /* ── NavBar ─────────────────────────────────────── */
    .navbar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: var(--nav-w);
      background: var(--bg-surface);
      border-right: 1px solid var(--border-subtle);
      display: flex; flex-direction: column;
      padding: 14px 0;
      z-index: 200;
      transition: width 0.35s var(--ease-out-expo);
      overflow: hidden;
    }
    .navbar:hover { width: var(--nav-w-open); box-shadow: 8px 0 24px rgba(0,0,0,0.3); }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 18px; margin-bottom: 16px;
      font-family: "Unbounded",sans-serif; font-size: 13px; font-weight: 700;
      color: var(--accent); white-space: nowrap;
    }
    .nav-logo svg { flex-shrink: 0; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 18px;
      color: var(--muted); cursor: pointer;
      border-left: 3px solid transparent;
      white-space: nowrap;
      transition: all 0.2s var(--ease-out-expo);
      font-size: 13px; font-weight: 500;
      position: relative;
    }
    .nav-item:hover { color: var(--ink); background: rgba(255,255,255,0.03); }
    .nav-item.active {
      color: var(--accent); border-left-color: var(--accent);
      background: var(--accent-glow);
    }
    .nav-item.active::after {
      content: ""; position: absolute; left: 0; top: 25%; bottom: 25%;
      width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
      box-shadow: 0 0 8px var(--accent);
    }
    .nav-item svg { flex-shrink: 0; width: 20px; height: 20px; opacity: 0.8; }
    .nav-item.active svg { opacity: 1; }
    .nav-label { opacity: 0; transition: opacity 0.2s 0.05s; }
    .navbar:hover .nav-label { opacity: 1; }
    .nav-spacer { flex: 1; }

    /* ── Page Layout ────────────────────────────────── */
    .main-content {
      margin-left: var(--nav-w);
      margin-top: var(--topbar-h);
      padding: 28px 32px;
      min-height: calc(100vh - var(--topbar-h));
      max-width: 1400px;
      transition: margin-left 0.35s var(--ease-out-expo);
    }
    .page { display: none; animation: pageFade 0.4s var(--ease-out-expo); }
    .page.active { display: block; }
    @keyframes pageFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Cards / Panels ─────────────────────────────── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 22px 24px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover { border-color: var(--border-default); }
    .card + .card { margin-top: 16px; }
    .card-title {
      font-size: 13px; font-weight: 700; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
      letter-spacing: 0.02em; text-transform: uppercase; color: var(--muted);
    }
    .card-title svg { width: 16px; height: 16px; color: var(--accent); }

    /* ── Stat Cards ──────────────────────────────────── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
    .stat-card {
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 20px 16px;
      text-align: center;
      transition: transform 0.2s var(--ease-out-expo), box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .stat-value {
      font-family: "Unbounded",sans-serif; font-size: 32px; font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 24px rgba(255,107,53,0.2);
    }
    .stat-label {
      font-size: 10px; color: var(--dim); text-transform: uppercase;
      letter-spacing: 0.1em; margin-top: 6px; font-weight: 600;
    }

    /* ── Tabs ─────────────────────────────────────────── */
    .tab-bar { display: flex; gap: 2px; border-bottom: 1px solid var(--border-default); margin-bottom: 16px; overflow-x: auto; }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      padding: 8px 14px; font-size: 12px; cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.15s;
      font-family: "Sora",sans-serif;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: pageFade 0.2s ease-out; }

    /* ── FilterBar ────────────────────────────────────── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 14px 18px;
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      margin-bottom: 18px;
    }
    .filter-select {
      background: var(--bg-surface); color: var(--ink);
      border: 1px solid var(--border-default); border-radius: var(--radius-xs);
      padding: 6px 10px; font-size: 12px; font-family: "Sora",sans-serif;
      cursor: pointer; transition: border-color 0.15s;
    }
    .filter-select:focus { border-color: var(--accent); outline: none; }
    .filter-pills { display: flex; gap: 4px; }
    .filter-pill {
      background: var(--bg-surface); color: var(--muted);
      border: 1px solid var(--border-default); border-radius: 999px;
      padding: 5px 12px; font-size: 11px; cursor: pointer;
      transition: all 0.2s var(--ease-out-expo); font-weight: 500;
    }
    .filter-pill:hover { border-color: var(--border-strong); color: var(--ink); }
    .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(255,107,53,0.25); }
    .filter-check { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); cursor: pointer; }
    .filter-check input { accent-color: var(--accent); }
    .filter-search {
      background: var(--bg-surface); color: var(--ink);
      border: 1px solid var(--border-default); border-radius: var(--radius-xs);
      padding: 6px 12px; font-size: 12px; flex: 1; min-width: 140px;
      font-family: "Sora",sans-serif; transition: border-color 0.15s;
    }
    .filter-search:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(255,107,53,0.1); }
    .filter-search::placeholder { color: var(--dim); }
    .filter-count { font-size: 11px; color: var(--dim); white-space: nowrap; font-weight: 600; font-family: var(--mono); }

    /* ── Clip Grid ────────────────────────────────────── */
    .clip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
    .clip-card {
      background: var(--bg-raised);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s var(--ease-out-expo);
      position: relative;
    }
    .clip-card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .clip-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-glow); }
    .clip-card-id { font-weight: 700; font-size: 12px; margin-bottom: 4px; letter-spacing: 0.01em; }
    .clip-card-time { font-size: 10px; color: var(--dim); font-family: var(--mono); letter-spacing: 0.02em; }
    .clip-card-desc { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .clip-card-meta { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .clip-tag {
      font-size: 9px; padding: 2px 7px; border-radius: 999px;
      background: var(--bg-overlay); color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
    }
    .clip-tag.narrative { color: var(--accent); background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2); }
    .clip-tag.atmospheric { color: var(--accent-2); background: rgba(78,168,209,0.08); border: 1px solid rgba(78,168,209,0.2); }
    .clip-tag.effects { color: var(--accent-3); background: rgba(244,185,66,0.08); border: 1px solid rgba(244,185,66,0.2); }
    .clip-tag.key { color: var(--green); background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2); }
    .clip-tag.perf { color: var(--purple); background: rgba(192,132,252,0.08); border: 1px solid rgba(192,132,252,0.2); }
    .clip-card.cut-scene { opacity: 0.65; border-left: 3px solid var(--dim); }
    .clip-card.cut-scene:hover { opacity: 0.85; }

    /* ── Drawer ───────────────────────────────────────── */
    .drawer-scrim {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 300;
      backdrop-filter: blur(2px);
    }
    .drawer-scrim.open { display: block; animation: scrimIn 0.2s ease-out; }
    @keyframes scrimIn { from { opacity: 0; } to { opacity: 1; } }
    .drawer {
      position: fixed; top: var(--topbar-h); right: 0; bottom: 0;
      width: 440px; max-width: 92vw;
      background: var(--bg-surface);
      border-left: 1px solid var(--border-subtle);
      transform: translateX(100%);
      transition: transform 0.35s var(--ease-out-expo);
      z-index: 310;
      overflow-y: auto;
      padding: 24px;
      box-shadow: -8px 0 32px rgba(0,0,0,0.4);
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .drawer-title { font-size: 16px; font-weight: 700; }
    .drawer-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 4px 8px; border-radius: var(--radius-xs);
    }
    .drawer-close:hover { color: var(--ink); background: var(--bg-raised); }
    .drawer-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .drawer-meta-item { font-size: 11px; }
    .drawer-meta-label { color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
    .drawer-meta-value { color: var(--ink); margin-top: 2px; }
    .drawer-section { margin-bottom: 16px; }
    .drawer-section-title {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .drawer-modes { display: flex; gap: 4px; margin-bottom: 12px; }
    .mode-btn {
      background: var(--bg-raised); color: var(--muted);
      border: 1px solid var(--border-default); border-radius: var(--radius-xs);
      padding: 4px 12px; font-size: 11px; cursor: pointer;
    }
    .mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Copy Pack ────────────────────────────────────── */
    .copy-pack { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
    .copy-btn {
      background: var(--bg-raised); color: var(--muted);
      border: 1px solid var(--border-default); border-radius: var(--radius-xs);
      padding: 5px 12px; font-size: 10px; cursor: pointer;
      transition: all 0.2s var(--ease-out-expo); font-weight: 600;
      letter-spacing: 0.02em; text-transform: uppercase;
    }
    .copy-btn:hover { color: var(--ink); border-color: var(--accent); background: var(--accent-glow); }
    .copy-card {
      background: var(--bg-base); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xs); padding: 12px;
      font-family: var(--mono); font-size: 11px;
      white-space: pre-wrap; word-break: break-all;
      max-height: 220px; overflow-y: auto;
      color: var(--ink-secondary); line-height: 1.6;
    }

    /* ── Hook Tags / Pills ────────────────────────────── */
    .hook-pill {
      display: inline-block; font-size: 10px; padding: 2px 8px;
      border-radius: 999px; background: rgba(255,107,53,0.12);
      color: var(--accent); margin: 2px;
    }

    /* ── Emotion Pills ─────────────────────────────────── */
    .emotion-pill {
      display: inline-block; font-size: 10px; padding: 2px 8px;
      border-radius: 999px; margin: 2px; font-weight: 500;
    }
    .emotion-warm    { background: rgba(255,138,91,0.15); color: #ff8a5b; }
    .emotion-cool    { background: rgba(107,227,215,0.15); color: #6be3d7; }
    .emotion-amber   { background: rgba(255,208,95,0.15); color: #ffd05f; }
    .emotion-intense { background: rgba(248,113,113,0.15); color: #f87171; }
    .emotion-serene  { background: rgba(52,211,153,0.15); color: #34d399; }
    .emotion-mystic  { background: rgba(155,108,255,0.15); color: #9b6cff; }
    .emotion-default { background: rgba(166,173,190,0.12); color: var(--ink-secondary); }

    /* ── Hero Card ────────────────────────────────────── */
    .hero-card {
      background: linear-gradient(135deg, rgba(255,107,53,0.06) 0%, rgba(155,108,255,0.06) 100%);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 24px;
    }
    .hero-title {
      font-size: 22px; font-weight: 800; color: var(--ink);
      margin-bottom: 4px; letter-spacing: -0.02em;
    }
    .hero-subtitle {
      font-size: 13px; color: var(--accent); font-weight: 600;
      margin-bottom: 16px;
    }
    .hero-synopsis {
      font-size: 13px; color: var(--ink-secondary); line-height: 1.7;
      margin-bottom: 16px;
    }
    .hero-meta {
      display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; color: var(--muted);
    }
    .hero-meta-item { display: flex; align-items: center; gap: 4px; }
    .hero-meta-label { color: var(--dim); }
    .hero-meta-value { color: var(--ink); font-weight: 600; }

    /* ── Constraint Badges ────────────────────────────── */
    .constraint-badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .constraint-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 3px 10px; border-radius: 999px;
      font-weight: 500; letter-spacing: 0.02em;
    }
    .constraint-badge-label { font-size: 9px; text-transform: uppercase; opacity: 0.7; margin-right: 2px; }
    .badge-tone   { background: rgba(155,108,255,0.15); color: #9b6cff; }
    .badge-genre  { background: rgba(52,211,153,0.15); color: #34d399; }
    .badge-style  { background: rgba(255,208,95,0.15); color: #ffd05f; }

    /* ── Prompt Cards (Drawer) ───────────────────────── */
    .prompt-card {
      background: var(--bg-raised); border: 1px solid var(--border-default);
      border-radius: 8px; padding: 10px 12px; margin-bottom: 8px;
    }
    .prompt-card-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--accent); font-weight: 600; margin-bottom: 4px;
    }
    .prompt-card-text { font-size: 11px; color: var(--ink); white-space: pre-wrap; line-height: 1.5; }

    /* ── Visual Strategy Tag ─────────────────────────── */
    .vs-tag {
      display: inline-block; font-size: 9px; padding: 1px 6px;
      border-radius: 4px; font-weight: 600; letter-spacing: 0.04em;
    }
    .vs-symbolic       { background: rgba(155,108,255,0.15); color: #9b6cff; }
    .vs-narrative      { background: rgba(52,211,153,0.15); color: #34d399; }
    .vs-spectacular    { background: rgba(255,138,91,0.15); color: #ff8a5b; }
    .vs-atmospheric    { background: rgba(107,227,215,0.15); color: #6be3d7; }
    .vs-performance    { background: rgba(255,208,95,0.15); color: #ffd05f; }
    .vs-default        { background: rgba(166,173,190,0.12); color: var(--ink-secondary); }

    /* ── Timeline SVG ─────────────────────────────────── */
    .timeline-container { overflow-x: auto; padding: 8px 0; }
    .timeline-svg { display: block; }
    .timeline-svg text { font-family: "Sora",sans-serif; }

    /* ── Phase Panel ──────────────────────────────────── */
    .phase-layout { display: grid; grid-template-columns: 180px 1fr; gap: 16px; }
    .phase-tabs-col { display: flex; flex-direction: column; gap: 4px; }
    .phase-tab {
      background: var(--bg-raised); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xs); padding: 8px 12px;
      cursor: pointer; font-size: 12px; color: var(--muted);
      transition: all 0.15s;
    }
    .phase-tab:hover { color: var(--ink); }
    .phase-tab.active { border-color: var(--accent); color: var(--accent); }
    .phase-content { min-height: 200px; }

    /* ── Competition ──────────────────────────────────── */
    .vote-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
    .vote-bar-label { width: 30px; font-weight: 600; }

    "synopsis": "臨床白の録音スタジオ——蛍光灯が天井を均等に覆い、壁一面に防音材ではなく磁気タイルが張り巡らされた異質な空間。そこに5人のバンドメンバーが、白衣とも作業服ともつかない衣装を身にまとい、各自の機材の前に立っている。カメラは最初の9秒間、誰の顔も映さない——楽器だけを映す。歪んだシンセベースのペダルボード、錆びた手甲を嵌めたベーシストの指がフレットを押さえる一瞬だけ映り、次のカットで蒸気排気ダクトの断面図が壁に貼られているのが見える。誰かがここを「工場」として設計したのだ。verse1が始まると、ドラマーの背後の壁に亀裂が走り始める——老耄の進行だ。しかしドラマーは叩くことをやめない。叩き続ける限り、その壁は崩れない。",
    "synopsis_final": "蛍光灯が格子状の影を落とす磁気タイル張りの録音スタジオ。冒頭、カメラは天井から床へ極低速で沈みながら、5人の黒いシルエットをただ映す——顔はない、表情もない、あるのは輪郭だけだ。ガラス面には人物が二重に映り込み、現実と反射の境界が最初から曖昧に溶け合っている。女が一人、コントロールルーム側のガラスの前に立ち、スパナを握っている。その指の関節が白く浮くほど力んでいるが、スパナはガラスに触れたまま動かない。\n\nカメラは一筆書きでスタジオ内を巡回し、ドラマー、ベーシスト、キーボーディストの手元を次々と抜いていく。スティックの木目、鍵盤に滲む汗、関節の腱が皮膚を押し上げる0.2ミリの隆起——演奏は続いているのに、音ではなく身体の物質感だけが画面を占領する。やがてドラマー背後の石膏壁に一本の亀裂が右へ走り始め、破片が目地に白い粉を積もらせる。壁は壊れかけているが、誰も手を止めない。\n\nスタジオ外、コンクリート打ちっぱなしの外壁をひび割れたクジラ型の巨大な影がゆっくりと横断していく。影は左から右へ流れ、壁を通過し、何も残さない。ガラス仕切り越しに女の顔と奥の5人の影が重なり合う二重露出の構図が繰り返され、最後のクリップでその映り込みは7秒かけて線形に消えていく——解放でも終焉でもなく、ただ輝度が落ちて黒になる。スパナは最後まで使われなかった。",
    "storyline": "誰の顔も映さない楽器クローズアップ。スパナを握る女の手だけが静止している。 → ドラマー背後の壁に亀裂が走り始め、演奏ビートに同期して1センチずつ伸びる。 → キーボーディストの中指が0.5秒だけ鍵盤を離れ、壁の欠片が一粒こぼれる。 → 女がスパナを握ったままガラスに触れている——女自身も構造物を維持している接触者だったと分かる。 → 外壁をひび割れクジラ型巨体の影が横切る。演奏音が最大値に達する。黒画面。解放は来ない。",

  function resolvePersonaAssetUrl(url) {
    const raw = String(url || "").trim();
    if (!raw) return "";
    if (/^(https?:|data:|blob:)/i.test(raw)) return raw;
    if (raw.startsWith("sessions/")) return "../../../" + raw.slice("sessions/".length);
    if (raw.startsWith("persona_pool_v2/")) return "../../../" + raw;
    return raw;
  }
  function proposalPersonaMeta(proposal) {
    const p = (proposal && typeof proposal === "object") ? proposal : {};
    const profile = (p.persona_profile && typeof p.persona_profile === "object") ? p.persona_profile : {};
    const personaId = String(p.persona_id || profile.id || "").trim();
    const personaName = String(p.persona_name || profile.name || personaId || "Unknown").trim();
    const portraitRaw = profile.portrait_url || profile.image_url || profile.avatar_url || (personaId ? `sessions/persona_pool_v2/portraits/${personaId}.png` : "");
    const portraitUrl = resolvePersonaAssetUrl(portraitRaw);
    const personaStatus = String(
      p.persona_status ||
      profile.stance_on_past ||
      profile.status ||
      profile.current_situation ||
      ""
    ).trim();
    const hasStoredProfile = profile && typeof profile === "object" && Object.keys(profile).length > 0;
    return { personaId, personaName, portraitUrl, personaStatus, profile, hasStoredProfile };
  }

    const el = document.getElementById("toast");

  function resolveSessionIdForEntryGate() {
    const sidFromCompetition = (competitionData && competitionData.session_id)
      ? String(competitionData.session_id).trim()
      : "";
    if (sidFromCompetition) return sidFromCompetition;
    const sidFromMeta = (meta && meta.session_id) ? String(meta.session_id).trim() : "";
    if (sidFromMeta) return sidFromMeta;
    const m = String(location.pathname || "").match(/(session-[^/]+)/);
    return m ? String(m[1] || "").trim() : "";
  }

  function ensureSessionEntryGate() {
    const params = new URLSearchParams(location.search || "");
    const fromEntry = params.get("entry") === "1";
    const bypass = params.get("bypass") === "1";
    if (fromEntry || bypass) return;
    const sid = resolveSessionIdForEntryGate();
    if (!sid) return;
    const qp = new URLSearchParams();
    qp.set("sid", sid);
    if (location.hash) qp.set("return_hash", String(location.hash).replace(/^#/, ""));
    location.replace(`../../../session-entry.html?${qp.toString()}`);
  }

  /* ================================================================

     ================================================================ */
  function renderHookCurveSvg(container, height) {
    if (!container || !hookCurve.length) { if (container) container.innerHTML = '<div style="color:var(--dim);font-size:11px;padding:12px">No hook curve data</div>'; return; }
    const w = Math.max(container.offsetWidth || container.parentElement?.offsetWidth || 600, 400);
    const h = height || 120;
    const pad = { t: 10, b: 20, l: 30, r: 10 };
    const maxT = timeline.max_sec || timeline.duration_sec || (hookCurve[hookCurve.length-1]?.time_sec || 1);
    const sx = (t) => pad.l + (t / maxT) * (w - pad.l - pad.r);
    const sy = (a) => pad.t + (1 - a) * (h - pad.t - pad.b);

    let path = hookCurve.map((p,i) => `${i===0?"M":"L"}${sx(p.time_sec).toFixed(1)},${sy(p.arousal||0).toFixed(1)}`).join(" ");
    let area = path + ` L${sx(hookCurve[hookCurve.length-1].time_sec).toFixed(1)},${(h-pad.b).toFixed(1)} L${pad.l},${(h-pad.b).toFixed(1)} Z`;

    let secLines = sections.map(s => {
      const x = sx(s.start_sec || (s.time_range_sec ? s.time_range_sec[0] : 0));
      return `<line x1="${x.toFixed(1)}" y1="${pad.t}" x2="${x.toFixed(1)}" y2="${h-pad.b}" stroke="rgba(255,255,255,0.08)" stroke-dasharray="3,3"/>
        <text x="${x.toFixed(1)}" y="${h-2}" fill="rgba(255,255,255,0.3)" font-size="9">${esc(s.label || s.section_id)}</text>`;
    }).join("");

    container.innerHTML = `<svg class="timeline-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
      ${secLines}
      <path d="${area}" fill="rgba(255,107,53,0.08)"/>
      <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2"/>
    </svg>`;
  }

        html += bpKV("Notes", rules.notes);
        html += '</div>';
      }

      return html;
    },
  };

  /* ================================================================
     PIPELINE PAGE
     ================================================================ */
  let pipelinePhase = "phase0";

  function _deriveLiveClipCount() {
    return Array.isArray(clips) ? clips.length : 0;
  }

  function _deriveLiveShotCount() {
    const shotIds = new Set();
    clips.forEach(c => {
      if (!c || typeof c !== "object") return;
      const direct = String(c.shot_intent_id || c.shot_id || "").trim();
      const refId = String((c.references && c.references.shot_intent_id) || "").trim();
      const id = direct || refId;
      if (id) shotIds.add(id);
    });
    if (shotIds.size > 0) return shotIds.size;
    if (Array.isArray(irSummary.shot_intents) && irSummary.shot_intents.length) {
      return irSummary.shot_intents.length;
    }
    return 0;
  }

  function _deriveLiveSceneCount() {
    if (Array.isArray(sections) && sections.length) return sections.length;
    const secIds = new Set();
    clips.forEach(c => {
      const sid = String((c && c.section_id) || "").trim();
      if (sid) secIds.add(sid);
    });
    return secIds.size;
  }

  function _deriveLiveTimelineDurationLabel() {
    const d = Number((timeline && (timeline.duration_sec ?? timeline.max_sec)) || 0);
    if (!Number.isFinite(d) || d <= 0) return "";
    return (Math.round(d * 10) / 10).toString() + "s";
  }

  function _withLiveSummaryItems(phaseKey, items) {
    const list = Array.isArray(items) ? items.map(it => Object.assign({}, it || {})) : [];
    if (!list.length) return list;

    const clipCount = _deriveLiveClipCount();
    const shotCount = _deriveLiveShotCount();
    const sceneCount = _deriveLiveSceneCount();
    const durationLabel = _deriveLiveTimelineDurationLabel();

    list.forEach(it => {
      const en = String(it.label_en || "").toLowerCase();
      const ja = String(it.label_ja || "");

      if (phaseKey === "phase6") {
        if (shotCount > 0 && (en.includes("shot") || ja.includes("ショット"))) {
          it.value = String(shotCount);
        }
        if (sceneCount > 0 && (en.includes("scene") || ja.includes("シーン"))) {
          it.value = String(sceneCount);
        }
      }

      if (phaseKey === "phase7") {
        if (en.includes("clip") || ja.includes("クリップ")) {
          it.value = String(clipCount);
        }
        if (durationLabel && ((en.includes("timeline") && en.includes("duration")) || ja.includes("タイムライン尺"))) {
          it.value = durationLabel;
        }
      }
    });

    return list;
  }

  function _phaseSummaryBulletText(bullet) {
    if (bullet == null) return "";
    if (typeof bullet === "string" || typeof bullet === "number" || typeof bullet === "boolean") {
      return String(bullet);
    }
    if (typeof bullet === "object") {
      const langIsJa = lang === "ja";
      const picks = langIsJa
        ? [bullet.text_ja, bullet.label_ja, bullet.value_ja, bullet.value, bullet.text_en, bullet.label_en, bullet.value_en, bullet.text, bullet.label]
        : [bullet.text_en, bullet.label_en, bullet.value_en, bullet.value, bullet.text_ja, bullet.label_ja, bullet.value_ja, bullet.text, bullet.label];
      for (const v of picks) {
        if (v == null) continue;
        if (typeof v === "string" && !v.trim()) continue;
        return String(v);
      }
      try {
        return JSON.stringify(bullet);
      } catch (_) {
        return String(bullet);
      }
    }
    return String(bullet);
  }

  /* ================================================================
     VISUAL CONCEPTS PAGE
     ================================================================ */
  function renderVisualConcepts() {
    const el = document.getElementById("visuals-content");
    function normalizeVisualConceptsPayload(payload) {
      if (!payload || typeof payload !== "object") return null;
      let vc = payload;
      for (let i = 0; i < 3; i++) {
        if (vc.visual_concepts && typeof vc.visual_concepts === "object") {
          vc = vc.visual_concepts; continue;
        }
        if (vc.adopted_result && typeof vc.adopted_result === "object") {
          vc = vc.adopted_result; continue;
        }
        break;
      }
      if (vc.visual_concepts_final && typeof vc.visual_concepts_final === "object") {
        vc = Object.assign({}, vc, vc.visual_concepts_final);
      }
      return vc;
    }
    const vc = normalizeVisualConceptsPayload(data.visual_concepts);
    if (!vc || typeof vc !== "object") {
      el.innerHTML = `<div class="card" style="color:var(--muted)">Visual Conceptsデータなし（Phase4V未実行）</div>`;
      return;
    }
    const L = (ja, en) => (lang === "ja" ? ja : en);

    // --- Visual key labels (ja/en) ---
    const KEY_LABELS = {
      color_grade_description: ["カラーグレード", "Color Grade"],
      primary_palette: ["カラーパレット", "Color Palette"],
      grain_quality: ["粒子 / ノイズ", "Grain / Noise"],
      contrast_style: ["コントラスト", "Contrast"],
      shadow_character: ["影の性質", "Shadow Character"],
      highlight_character: ["ハイライトの性質", "Highlight Character"],
      dominant_color: ["基調色", "Dominant Color"],
      secondary_colors: ["補助色", "Secondary Colors"],
      material_texture: ["素材質感", "Material Texture"],
      body_proportion: ["体型", "Body Proportion"],
      face_detail: ["顔の造形", "Face Detail"],
      clothing_outfit: ["衣装", "Clothing / Outfit"],
      prop_details: ["小道具", "Props"],
      lighting_interaction: ["光との関係", "Lighting Interaction"],
      architecture_style: ["建築様式", "Architecture Style"],
      floor_material: ["床材", "Floor Material"],
      wall_material: ["壁材", "Wall Material"],
      lighting_setup: ["照明設計", "Lighting Setup"],
      key_objects: ["主要オブジェクト", "Key Objects"],
      atmosphere_detail: ["空気感", "Atmosphere"],
      form_factor: ["形状", "Form Factor"],
      behavior: ["振る舞い", "Behavior"],
      particle_detail: ["粒子表現", "Particle Detail"],
      interaction_with_environment: ["環境との相互作用", "Environmental Interaction"],
      gender_presentation: ["性別表現", "Gender Presentation"],
      age_impression: ["年齢印象", "Age Impression"],
      body_build: ["体格", "Body Build"],
      hair: ["髪", "Hair"],
      face_features: ["顔の特徴", "Face Features"],
      costume: ["衣装", "Costume"],
      stage_presence: ["佇まい", "Stage Presence"],
      signature_gesture: ["歌唱時の仕草", "Signature Gesture"],
    };
    function keyLabel(k) {
      const pair = KEY_LABELS[k];
      return pair ? L(pair[0], pair[1]) : k;
    }

    // --- Color helpers ---
    function hexSwatch(hex, size) {
      size = size || 16;
      return `<span style="display:inline-block;width:${size}px;height:${size}px;background:${hex};border-radius:3px;border:1px solid var(--border);vertical-align:middle;flex-shrink:0"></span>`;
    }
    function renderPaletteStrip(colors) {
      if (!Array.isArray(colors) || !colors.length) return "";
      return `<div style="display:flex;gap:4px;flex-wrap:wrap;margin:4px 0">${colors.map(c => {
        const isHex = /^#[0-9A-Fa-f]{6}$/.test(c);
        return `<div style="display:flex;align-items:center;gap:4px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:3px 8px 3px 4px">
          ${isHex ? hexSwatch(c, 20) : ""}<span style="font-size:11px;font-family:monospace">${esc(c)}</span>
        </div>`;
      }).join("")}</div>`;
    }
    function inlineColorText(text) {
      if (typeof text !== "string") return esc(String(text || ""));
      return esc(text).replace(/#[0-9A-Fa-f]{6}/g, m =>
        `${hexSwatch(m, 12)}<code style="font-size:10px;margin:0 2px">${m}</code>`
      );
    }

    // --- T2I prompt block ---
    function renderT2I(visual) {
      const prompt = (visual && (visual.t2i_prompt || visual.t2i_style_prompt)) || "";
      if (!prompt) return "";
      return `<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <span style="font-size:11px;color:var(--accent);font-weight:600">T2I Prompt</span>
          <button onclick="navigator.clipboard.writeText(this.closest('.vc-card').querySelector('.t2i-block').textContent).then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)})" style="font-size:10px;padding:2px 8px;cursor:pointer;border:1px solid var(--border);border-radius:4px;background:var(--bg-secondary);color:var(--text)">Copy</button>
        </div>
        <pre class="t2i-block" style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow-y:auto;line-height:1.5">${esc(prompt)}</pre>
      </div>`;
    }

    // --- Established section (collapsible) ---
    function renderEstablished(est) {
      if (!est || typeof est !== "object" || !Object.keys(est).length) return "";
      return `<details class="collapsible" style="margin-top:8px"><summary style="font-size:11px;color:var(--muted)">${L("確定データ（上流フェーズ）", "Established (upstream phases)")}</summary>
        <pre style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:10px;white-space:pre-wrap;max-height:300px;overflow-y:auto">${esc(JSON.stringify(est, null, 2))}</pre>
      </details>`;
    }

    // --- Visual description row ---
    function vcRow(label, value, opts) {
      opts = opts || {};
      let valHtml;
      if (opts.palette) {
        valHtml = renderPaletteStrip(value);
      } else if (opts.list && Array.isArray(value)) {
        valHtml = `<ul style="margin:2px 0 2px 16px;padding:0;list-style:disc">${value.map(v => `<li style="margin:2px 0">${inlineColorText(v)}</li>`).join("")}</ul>`;
      } else if (opts.props && typeof value === "object" && value !== null) {
        valHtml = Object.entries(value).map(([pk, pv]) =>
          `<div style="margin:4px 0;padding:6px 8px;background:var(--bg-secondary);border-radius:4px;border-left:3px solid var(--accent)">
            <div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:2px">${esc(pk)}</div>
            <div style="font-size:12px;line-height:1.5">${inlineColorText(pv)}</div>
          </div>`
        ).join("");
      } else {
        valHtml = `<div style="line-height:1.5">${inlineColorText(value)}</div>`;
      }
      return `<div class="vc-row" style="margin-bottom:8px">
        <div class="vc-label" style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px">${esc(label)}</div>
        <div class="vc-value" style="font-size:12px">${valHtml}</div>
      </div>`;
    }

    // --- Section card wrapper ---
    function vcCard(title, subtitle, bodyHtml) {
      return `<div class="card vc-card" style="margin-bottom:12px">
        <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>${esc(title)}</span>
          <span style="font-size:10px;color:var(--muted);font-style:italic">${esc(subtitle || "")}</span>
        </div>
        <div style="padding:0 4px">${bodyHtml}</div>
      </div>`;
    }

    let html = "";

    // ===== Atmosphere =====
    const atm = vc.atmosphere;
    if (atm && typeof atm === "object") {
      const v = atm.visual || {};
      let body = "";
      if (v.primary_palette) body += vcRow(keyLabel("primary_palette"), v.primary_palette, {palette: true});
      if (v.color_grade_description) body += vcRow(keyLabel("color_grade_description"), v.color_grade_description);
      if (v.contrast_style) body += vcRow(keyLabel("contrast_style"), v.contrast_style);
      if (v.shadow_character) body += vcRow(keyLabel("shadow_character"), v.shadow_character);
      if (v.highlight_character) body += vcRow(keyLabel("highlight_character"), v.highlight_character);
      if (v.grain_quality) body += vcRow(keyLabel("grain_quality"), v.grain_quality);
      body += renderT2I(v);
      body += renderEstablished(atm.established);
      html += vcCard(
        L("雰囲気 / カラーグレーディング", "Atmosphere / Color Grading"),
        atm.persona_name ? L("担当: ", "By: ") + atm.persona_name : "",
        body
      );
    }

    // ===== Characters =====
    const chars = Array.isArray(vc.characters) ? vc.characters : [];
    if (chars.length) {
      html += `<h3 style="font-size:14px;margin:16px 0 8px">${esc(L("キャラクター", "Characters"))} (${chars.length})</h3>`;
      for (const ch of chars) {
        const v = ch.visual || {};
        let body = "";
        // Color info group
        if (v.dominant_color || v.secondary_colors) {
          let colorHtml = "";
          if (v.dominant_color) colorHtml += `<span style="font-weight:600">${inlineColorText(v.dominant_color)}</span>`;
          if (Array.isArray(v.secondary_colors) && v.secondary_colors.length) {
            colorHtml += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">${v.secondary_colors.map(c => `<span style="font-size:11px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;padding:2px 6px">${inlineColorText(c)}</span>`).join("")}</div>`;
          }
          body += vcRow(keyLabel("dominant_color") + " / " + keyLabel("secondary_colors"), "");
          body = body.replace(/<div class="vc-value"[^>]*>.*?<\/div>\s*<\/div>$/s,
            `<div class="vc-value" style="font-size:12px">${colorHtml}</div></div>`);
        }
        if (v.body_proportion) body += vcRow(keyLabel("body_proportion"), v.body_proportion);
        if (v.face_detail) body += vcRow(keyLabel("face_detail"), v.face_detail);
        if (v.clothing_outfit) body += vcRow(keyLabel("clothing_outfit"), v.clothing_outfit);
        if (v.material_texture) body += vcRow(keyLabel("material_texture"), v.material_texture);
        if (v.prop_details) body += vcRow(keyLabel("prop_details"), v.prop_details, {props: true});
        if (v.lighting_interaction) body += vcRow(keyLabel("lighting_interaction"), v.lighting_interaction);
        body += renderT2I(v);
        body += renderEstablished(ch.established);
        html += vcCard(
          ch.character_name || ch.character_id || "?",
          ch.persona_name ? L("担当: ", "By: ") + ch.persona_name : "",
          body
        );
      }
    }

    // ===== Locations =====
    const locs = Array.isArray(vc.locations) ? vc.locations : [];
    if (locs.length) {
      html += `<h3 style="font-size:14px;margin:16px 0 8px">${esc(L("ロケーション", "Locations"))} (${locs.length})</h3>`;
      for (const loc of locs) {
        const v = loc.visual || {};
        let body = "";
        if (v.dominant_color) body += vcRow(keyLabel("dominant_color"), v.dominant_color);
        if (v.architecture_style) body += vcRow(keyLabel("architecture_style"), v.architecture_style);
        if (v.floor_material) body += vcRow(keyLabel("floor_material"), v.floor_material);
        if (v.wall_material) body += vcRow(keyLabel("wall_material"), v.wall_material);
        if (v.lighting_setup) body += vcRow(keyLabel("lighting_setup"), v.lighting_setup);
        if (v.key_objects) body += vcRow(keyLabel("key_objects"), v.key_objects, {list: true});
        if (v.atmosphere_detail) body += vcRow(keyLabel("atmosphere_detail"), v.atmosphere_detail);
        body += renderT2I(v);
        body += renderEstablished(loc.established);
        html += vcCard(
          loc.location_name || loc.location_id || "?",
          loc.persona_name ? L("担当: ", "By: ") + loc.persona_name : "",
          body
        );
      }
    }

    // ===== World Phenomena =====
    const wp = Array.isArray(vc.world_phenomena) ? vc.world_phenomena : [];
    if (wp.length) {
      html += `<h3 style="font-size:14px;margin:16px 0 8px">${esc(L("世界現象", "World Phenomena"))} (${wp.length})</h3>`;
      for (const ph of wp) {
        const v = ph.visual || {};
        let body = "";
        if (v.dominant_color) body += vcRow(keyLabel("dominant_color"), v.dominant_color);
        if (v.form_factor) body += vcRow(keyLabel("form_factor"), v.form_factor);
        if (v.behavior) body += vcRow(keyLabel("behavior"), v.behavior);
        if (v.particle_detail) body += vcRow(keyLabel("particle_detail"), v.particle_detail);
        if (v.interaction_with_environment) body += vcRow(keyLabel("interaction_with_environment"), v.interaction_with_environment);
        body += renderT2I(v);
        body += renderEstablished(ph.established);
        html += vcCard(
          ph.phenomenon_name || ph.phenomenon_id || "?",
          ph.persona_name ? L("担当: ", "By: ") + ph.persona_name : "",
          body
        );
      }
    }

    // ===== Vocalists =====
    const vocs = Array.isArray(vc.vocalists) ? vc.vocalists : [];
    if (vocs.length) {
      html += `<h3 style="font-size:14px;margin:16px 0 8px">${esc(L("ボーカリスト", "Vocalists"))} (${vocs.length})</h3>`;
      for (const vo of vocs) {
        const v = vo.visual || {};
        let body = "";
        if (vo.contrast_note) body += vcRow(L("嫌いの壁との対極", "Contrast Note"), vo.contrast_note);
        if (v.gender_presentation) body += vcRow(keyLabel("gender_presentation"), v.gender_presentation);
        if (v.age_impression) body += vcRow(keyLabel("age_impression"), v.age_impression);
        if (v.body_build) body += vcRow(keyLabel("body_build"), v.body_build);
        if (v.hair) body += vcRow(keyLabel("hair"), v.hair);
        if (v.face_features) body += vcRow(keyLabel("face_features"), v.face_features);
        if (v.costume) body += vcRow(keyLabel("costume"), v.costume);
        if (v.stage_presence) body += vcRow(keyLabel("stage_presence"), v.stage_presence);
        if (v.signature_gesture) body += vcRow(keyLabel("signature_gesture"), v.signature_gesture);
        if (Array.isArray(vo.anti_patterns_avoided) && vo.anti_patterns_avoided.length) {
          body += vcRow(L("回避したパターン", "Anti-patterns Avoided"), vo.anti_patterns_avoided, {list: true});
        }
        body += renderT2I(v);
        html += vcCard(
          vo.vocalist_concept || vo.vocalist_id || "?",
          vo.role || "",
          body
        );
      }
    }

    // ===== Goji Validation =====
    const gv = vc.goji_validation;
    if (gv && typeof gv === "object") {
      const adj = Array.isArray(gv.adjustments) ? gv.adjustments : [];
      const flags = Array.isArray(gv.anti_patterns_flagged) ? gv.anti_patterns_flagged : [];
      let body = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:8px">
        <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:6px">
          <div style="font-size:20px;font-weight:700;color:${gv.validated ? "var(--accent)" : "#e74c3c"}">${gv.validated ? "OK" : "NG"}</div>
          <div style="font-size:10px;color:var(--muted)">${L("検証結果", "Validation")}</div>
        </div>
        <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:6px">
          <div style="font-size:20px;font-weight:700">${adj.length}</div>
          <div style="font-size:10px;color:var(--muted)">${L("修正箇所", "Adjustments")}</div>
        </div>
        <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:6px">
          <div style="font-size:20px;font-weight:700">${flags.length}</div>
          <div style="font-size:10px;color:var(--muted)">${L("アンチパターン", "Anti-patterns")}</div>
        </div>
        <div style="text-align:center;padding:8px;background:var(--bg-secondary);border-radius:6px">
          <div style="font-size:20px;font-weight:700">${gv.disgust_wall_sampled || 0}</div>
          <div style="font-size:10px;color:var(--muted)">${L("嫌いの壁サンプル", "Disgust Wall")}</div>
        </div>
      </div>`;
      if (adj.length) {
        body += `<details class="collapsible" style="margin-top:8px"><summary style="font-size:11px;color:var(--muted)">${L("修正詳細", "Adjustment Details")} (${adj.length})</summary>
        <div style="margin-top:6px">`;
        for (const a of adj) {
          const elemLabel = String(a.element_type || a.element || "");
          const elemId = String(a.element_id || "");
          body += `<div style="margin-bottom:8px;padding:6px 8px;background:var(--bg-secondary);border-radius:4px;border-left:3px solid var(--accent);font-size:11px">
            <div style="font-weight:600;color:var(--accent);margin-bottom:3px">${esc(elemLabel)}${elemId ? " / " + esc(elemId) : ""} — <code>${esc(String(a.field || ""))}</code></div>
            <div style="display:grid;grid-template-columns:auto 1fr;gap:2px 8px">
              <span style="color:var(--muted)">${L("変更前:", "Before:")}</span><span style="text-decoration:line-through;opacity:0.6">${esc(String(a.before || "").substring(0, 120))}</span>
              <span style="color:var(--muted)">${L("変更後:", "After:")}</span><span>${esc(String(a.after || "").substring(0, 120))}</span>
              <span style="color:var(--muted)">${L("理由:", "Reason:")}</span><span style="font-style:italic">${esc(String(a.reason || ""))}</span>
            </div>
          </div>`;
        }
        body += "</div></details>";
      }
      if (flags.length) {
        body += `<details class="collapsible" style="margin-top:8px"><summary style="font-size:11px;color:var(--muted)">${L("検出アンチパターン", "Anti-patterns Flagged")} (${flags.length})</summary>
        <ul style="font-size:11px;margin-top:4px">${flags.map(f => `<li>${esc(String(f))}</li>`).join("")}</ul></details>`;
      }
      html += vcCard(L("ゴジ検証", "Goji Validation"), "", body);
    }

    if (!html) {
      html = `<div class="card" style="color:var(--muted)">Visual Conceptsデータなし</div>`;
    }
    el.innerHTML = html;
  }

  function renderPipeline() {
    const tabsEl = document.getElementById("pipeline-tabs");
    const phases = ["phase0","phase1","phase2","phase3","phase4","phase4v","phase4g","phase5","phase6","phase7"];
    tabsEl.innerHTML = phases.map(p => {
      const pd = phaseData[p] || {};
      const label = lang === "ja" ? (pd.title_ja || p) : (pd.title_en || p);
      return `<div class="phase-tab${pipelinePhase===p?" active":""}" data-phase="${p}">${esc(label)}</div>`;
    }).join("");
    tabsEl.onclick = e => { const t = e.target.closest("[data-phase]"); if (t) { pipelinePhase = t.dataset.phase; renderPipeline(); } };

    const contentEl = document.getElementById("pipeline-content");
    const pd = phaseData[pipelinePhase] || {};
    let html = "";
    const items = _withLiveSummaryItems(pipelinePhase, pd.summary_items || []);
    if (items.length) {
      html += '<div class="card"><div class="card-title">' + esc(lang==="ja" ? (pd.title_ja||pipelinePhase) : (pd.title_en||pipelinePhase)) + '</div>';
      items.forEach(it => {
        const label = lang === "ja" ? (it.label_ja || it.label_en || "") : (it.label_en || "");
        html += `<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:1px solid var(--border-subtle)">
          <span style="color:var(--muted)">${esc(label)}</span><span>${esc(String(it.value ?? ""))}</span></div>`;
      });
      const bullets = pd.summary_bullets || [];
      if (bullets.length) html += '<ul class="bp-list" style="margin-top:8px">' + bullets.map(b => `<li>${esc(_phaseSummaryBulletText(b))}</li>`).join("") + '</ul>';
      if (pd.raw) {
        html += `<details class="collapsible" style="margin-top:8px"><summary>Raw JSON</summary><div class="copy-card">${esc(JSON.stringify(pd.raw, null, 2))}</div></details>`;
      }
      html += '</div>';
    } else {
      html += `<div class="card" style="color:var(--muted)">${t("noData")}</div>`;
    }
    contentEl.innerHTML = html;

    // Competition
    renderCompetition();
  }

  function _resolveCompetitionWinnerKey(voting) {
    if (!voting || typeof voting !== "object") return "";
    if (voting.is_tiebreak && voting.goji_vote) {
      if (typeof voting.goji_vote.dislike === "string" && voting.goji_vote.dislike.trim()) {
        return voting.goji_vote.dislike.trim();
      }
      if (typeof voting.goji_vote.like === "string" && voting.goji_vote.like.trim()) {
        return voting.goji_vote.like.trim();
      }
    }
    const direct = [voting.winner_key, voting.selected, voting.winner, voting.goji_voted_for];
    for (const x of direct) {
      if (typeof x === "string" && x.trim()) return x.trim();
    }
    const selectedProposalId = typeof voting.selected_proposal_id === "string" ? voting.selected_proposal_id.trim() : "";
    const candidateMap = (voting.candidate_map && typeof voting.candidate_map === "object") ? voting.candidate_map : {};
    if (selectedProposalId) {
      for (const [k, v] of Object.entries(candidateMap)) {
        if (String(v || "").trim() === selectedProposalId) return String(k || "").trim();
      }
    }
    const tally = (voting.tally && typeof voting.tally === "object") ? voting.tally : {};
    let bestKey = "";
    let best = -Infinity;
    let tied = false;
    Object.entries(tally).forEach(([k, v]) => {
      const n = Number(v || 0);
      if (n > best) {
        best = n;
        bestKey = k;
        tied = false;
      } else if (n === best) {
        tied = true;
      }
    });
    return bestKey && !tied ? bestKey : "";
  }

  function _candidatePersonaLabel(candidateKey, voting, proposals) {
    const key = String(candidateKey || "").trim();
    if (!key) return "";
    const candidateMap = (voting && voting.candidate_map && typeof voting.candidate_map === "object") ? voting.candidate_map : {};
    const proposalId = String(candidateMap[key] || "").trim();
    if (!proposalId || !Array.isArray(proposals)) return "";
    const p = proposals.find(x => x && typeof x === "object" && String(x.proposal_id || "").trim() === proposalId);
    if (!p) return "";
    return String(p.persona_name || p.persona_id || proposalId || "").trim();
  }

  function _annotateCompetitionWinnersInPlace(competition) {
    if (!competition || typeof competition !== "object") return;
    const proposals = Array.isArray(competition.proposals) ? competition.proposals : null;
    if (!proposals || !proposals.length) return;
    const voting = (competition.voting && typeof competition.voting === "object")
      ? competition.voting
      : ((competition.vote && typeof competition.vote === "object") ? competition.vote : {});
    const candidateMap = (voting.candidate_map && typeof voting.candidate_map === "object")
      ? voting.candidate_map
      : {};
    const winnerKey = _resolveCompetitionWinnerKey(voting);

    let winnerProposalId = "";
    if (typeof voting.selected_proposal_id === "string" && voting.selected_proposal_id.trim()) {
      winnerProposalId = voting.selected_proposal_id.trim();
    }
    if (!winnerProposalId && winnerKey && candidateMap && Object.prototype.hasOwnProperty.call(candidateMap, winnerKey)) {
      winnerProposalId = String(candidateMap[winnerKey] || "").trim();
    }
    if (!winnerProposalId && winnerKey) {
      const direct = proposals.find(p => p && typeof p === "object" && String(p.proposal_id || "").trim() === winnerKey);
      if (direct) winnerProposalId = String(direct.proposal_id || "").trim();
    }

    if (winnerKey) competition.winner_candidate_key = winnerKey;
    if (winnerProposalId) competition.winner_proposal_id = winnerProposalId;

    proposals.forEach(p => {
      if (!p || typeof p !== "object") return;
      const proposalId = String(p.proposal_id || "").trim();
      let candKey = "";
      Object.entries(candidateMap).some(([k, v]) => {
        if (String(v || "").trim() === proposalId) {
          candKey = String(k || "").trim();
          return true;
        }
        return false;
      });
      if (candKey) p.vote_candidate_key = candKey;
      const isWinner = !!(
        (winnerProposalId && proposalId && proposalId === winnerProposalId) ||
        (!winnerProposalId && winnerKey && candKey && candKey === winnerKey)
      );
      p.is_winner = isWinner;
    });
  }

  function _extractCompetitionVotes(voting) {
    if (!voting || typeof voting !== "object") return [];
    const votes = Array.isArray(voting.votes) ? voting.votes.slice() : [];
    const gojiVote = (voting.goji_vote && typeof voting.goji_vote === "object") ? voting.goji_vote : null;
    if (gojiVote) {
      const sig = [
        String(gojiVote.voter || "").trim(),
        String(gojiVote.like || "").trim(),
        String(gojiVote.dislike || "").trim(),
        String(gojiVote.like_reason || "").trim(),
        String(gojiVote.dislike_reason || "").trim()
      ].join("||");
      const exists = votes.some(v => {
        if (!v || typeof v !== "object") return false;
        const x = [
          String(v.voter || "").trim(),
          String(v.like || "").trim(),
          String(v.dislike || "").trim(),
          String(v.like_reason || "").trim(),
          String(v.dislike_reason || "").trim()
        ].join("||");
        return x === sig;
      });
      if (!exists) votes.push(gojiVote);
    }
    return votes;
  }

  function _groupVoteReasonsByCandidate(voting, votes) {
    const grouped = {};
    const candidateMap = (voting && voting.candidate_map && typeof voting.candidate_map === "object") ? voting.candidate_map : {};
    Object.keys(candidateMap).forEach(k => {
      grouped[k] = { likes: [], dislikes: [] };
    });

    (Array.isArray(votes) ? votes : []).forEach(v => {
      if (!v || typeof v !== "object") return;
      const voter = String(v.voter || v.persona_name || v.persona || "").trim() || "Unknown";
      const likeKey = String(v.like || "").trim();
      const dislikeKey = String(v.dislike || "").trim();
      const likeReason = String(v.like_reason || "").trim();
      const dislikeReason = String(v.dislike_reason || "").trim();

      if (likeKey && likeReason) {
        if (!grouped[likeKey]) grouped[likeKey] = { likes: [], dislikes: [] };
        grouped[likeKey].likes.push({ voter, reason: likeReason });
      }
      if (dislikeKey && dislikeReason) {
        if (!grouped[dislikeKey]) grouped[dislikeKey] = { likes: [], dislikes: [] };
        grouped[dislikeKey].dislikes.push({ voter, reason: dislikeReason });
      }
    });

    return grouped;
  }

  function renderCompetition() {
    const el = document.getElementById("competition-content");
    const phaseOrder = ["phase1","phase2a","phase3","phase4a","phase4"];
    const extraPhases = Object.keys(competitionData || {}).filter(k => /^phase/i.test(String(k)) && !phaseOrder.includes(k));
    const phases = phaseOrder.concat(extraPhases);
    let html = "";
    phases.forEach(pk => {
      const cd = competitionData[pk];
      if (!cd || typeof cd !== "object") return;
      _annotateCompetitionWinnersInPlace(cd);
      const voting = cd.voting || cd.vote || {};
      const proposals = cd.proposals || [];
      if (!proposals.length && !voting.winner_key) return;

      html += `<div class="card" style="margin-top:8px"><div class="card-title">${esc(pk)}</div>`;

      // Vote results
      const tally = voting.tally || voting.like_tally || {};
      const dislikeTally = voting.dislike_tally || {};
      const winner = _resolveCompetitionWinnerKey(voting);
      const maxTotalVote = Math.max(...Object.keys(tally).map(k => (Number(tally[k] || 0) + Number(dislikeTally[k] || 0))), 1);
      const winnerLabel = winner ? _candidatePersonaLabel(winner, voting, proposals) : "";

      if (winner) {
        html += `<div class="vote-health"><b>${t("winner")}:</b> ${esc(winner)}${winnerLabel && winnerLabel !== winner ? ` / ${esc(winnerLabel)}` : ""}</div>`;
      }

      if (Object.keys(tally).length) {
        Object.keys(tally).forEach(k => {
          const likes = Number(tally[k] || 0);
          const dislikes = Number(dislikeTally[k] || 0);
          const total = likes + dislikes;
          const totalPct = (total / maxTotalVote * 100).toFixed(0);
          const likeInTotalPct = total > 0 ? (likes / total * 100).toFixed(0) : "0";
          const disInTotalPct = String(100 - Number(likeInTotalPct));
          const candLabel = _candidatePersonaLabel(k, voting, proposals);
          const candSuffix = candLabel && candLabel !== k
            ? ` <span style="color:var(--muted)">· ${esc(candLabel)}</span>`
            : "";
          html += `<div class="vote-bar-row">
            <div class="vote-bar-label">${esc(k)}${candSuffix}${k===winner?' <span class="vote-winner">'+t("winner")+'</span>':""}</div>
            <div class="vote-bar-track"><div style="display:flex;height:100%;width:${totalPct}%"><div class="vote-bar-like" style="width:${likeInTotalPct}%"></div><div class="vote-bar-dislike" style="width:${disInTotalPct}%"></div></div></div>
            <div class="vote-bar-count">T${total} / +${likes} -${dislikes}</div>
          </div>`;
        });
      }

      const vh = voting.vote_health;
      if (vh) {
        html += `<div class="vote-health">${t("ballots")}: ${vh.valid_ballot_count||0} | ${t("quorumMet")}: ${vh.quorum_met?"Yes":"No"}</div>`;
      }
      if (voting.is_tiebreak) {
        const byDislike = (voting.goji_vote && voting.goji_vote.dislike) ? String(voting.goji_vote.dislike) : "";
        const byLike = (voting.goji_vote && voting.goji_vote.like) ? String(voting.goji_vote.like) : "";
        const by = byDislike || byLike;
        const mode = byDislike ? "dislike" : "like";
        html += `<div class="vote-health">Tiebreak: ${by ? `Goji ${mode} -> ${esc(by)}` : "yes"}</div>`;
      }

      const votes = _extractCompetitionVotes(voting);
      const reasonBuckets = _groupVoteReasonsByCandidate(voting, votes);
      const reasonKeys = Array.from(new Set([
        ...Object.keys(tally || {}),
        ...Object.keys(dislikeTally || {}),
        ...Object.keys(reasonBuckets || {})
      ])).filter(k => {
        const bucket = reasonBuckets[k];
        return !!(bucket && ((bucket.likes && bucket.likes.length) || (bucket.dislikes && bucket.dislikes.length)));
      });

      if (reasonKeys.length) {
        html += `<details class="collapsible vote-reasons"><summary>Vote reasons (${votes.length})</summary>`;
        reasonKeys.forEach(k => {
          const bucket = reasonBuckets[k] || { likes: [], dislikes: [] };
          const candLabel = _candidatePersonaLabel(k, voting, proposals);
          const winnerBadge = (winner && k === winner) ? ` <span class="vote-winner">${t("winner")}</span>` : "";

          html += `<div class="vote-reason-candidate">`;
          html += `<div class="vote-reason-head">${esc(k)}${candLabel && candLabel !== k ? ` · ${esc(candLabel)}` : ""}${winnerBadge}</div>`;

          html += `<div class="vote-reason-block like"><div class="vote-reason-title">Like (${bucket.likes.length})</div>`;
          if (bucket.likes.length) {
            bucket.likes.forEach(item => {
              html += `<div class="vote-reason-item"><span class="vote-reason-voter">${esc(item.voter)}</span><span class="vote-reason-text">${esc(item.reason)}</span></div>`;
            });
          } else {
            html += `<div class="vote-reason-empty">-</div>`;
          }
          html += `</div>`;

          html += `<div class="vote-reason-block dislike"><div class="vote-reason-title">Dislike (${bucket.dislikes.length})</div>`;
          if (bucket.dislikes.length) {
            bucket.dislikes.forEach(item => {
              html += `<div class="vote-reason-item"><span class="vote-reason-voter">${esc(item.voter)}</span><span class="vote-reason-text">${esc(item.reason)}</span></div>`;
            });
          } else {
            html += `<div class="vote-reason-empty">-</div>`;
          }
          html += `</div>`;

          html += `</div>`;
        });
        html += `</details>`;
      }

      // Proposals (collapsible)
      if (proposals.length) {
        html += `<details class="collapsible" style="margin-top:8px"><summary>${t("proposals")} (${proposals.length})</summary>`;
        proposals.forEach((p, idx) => {
          const pm = proposalPersonaMeta(p);
          const name = pm.personaName || p.proposal_id || "?";
          const winnerBadge = p.is_winner ? ` <span class="vote-winner">${t("winner")}</span>` : "";
          const statusBadge = pm.personaStatus ? ` <span style="font-size:10px;color:var(--muted)">[${esc(trunc(pm.personaStatus, 22))}]</span>` : "";
          const content = p.content || p.proposal || p;
          const summary = typeof content === "object" ? (content.creative_seed || content.theme || JSON.stringify(content).slice(0,120)) : String(content).slice(0,120);
          const who = (p.who_should_watch || "").trim();
          const why = (p.why_it_came || "").trim();
          const portrait = pm.portraitUrl
            ? `<img src="${esc(pm.portraitUrl)}" alt="" style="width:30px;height:30px;border-radius:50%;object-fit:cover;border:1px solid var(--border-default);flex-shrink:0" loading="lazy" onerror="this.style.display='none'">`
            : "";
          html += `<div class="outline-card competition-proposal" data-phase="${esc(pk)}" data-index="${idx}" title="クリックしてペルソナ情報を表示">
            <div style="display:flex;align-items:center;gap:8px;min-width:0">
              ${portrait}
              <div style="min-width:0;flex:1">
                <div class="outline-label">${esc(name)}${statusBadge}${winnerBadge}${pm.hasStoredProfile ? "" : '<span style="font-size:10px;color:var(--muted)"> (personal info not stored)</span>'}</div>
              </div>
            </div>
            <div style="font-size:11px;color:var(--muted);margin:4px 0;">${esc(summary)}</div>
            ${who ? `<div style="font-size:10px;color:var(--dim)">見る人: ${esc(who)}</div>` : ""}
            ${why ? `<div style="font-size:10px;color:var(--dim)">なぜ: ${esc(why)}</div>` : ""}
          </div>`;
        });
        html += '</details>';
      }

      html += '</div>';
    });

    el.innerHTML = html || `<div style="color:var(--muted);font-size:12px">${t("noData")}</div>`;

    el.querySelectorAll(".competition-proposal").forEach(card => {
      card.addEventListener("click", e => {
        if (e.target.closest("summary")) return;
        const phase = card.dataset.phase;
        const index = Number(card.dataset.index || -1);
        const proposals = (competitionData[phase] || {}).proposals || [];
        const proposal = proposals[index];
        if (!proposal) return;
        renderPersonaDrawerFromProposal(proposal, phase);
        openDrawer();
      });
    });
  }
