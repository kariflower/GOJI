<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MV Sessions</title>
  <style>
    :root {
      --bg: #0a0b0e;
      --ink: #ece9e3;
      --muted: #b9b2a9;
      --line: rgba(255, 255, 255, 0.12);
      --panel: #111318;
      --panel-2: #191b22;
      --accent: #ff6b35;
      --accent-2: #4ea8d1;
      --ok: #34d399;
      --danger: #f87171;
      --radius: 16px;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      background:
        radial-gradient(1100px 680px at 102% -12%, rgba(255, 107, 53, 0.2), transparent 55%),
        radial-gradient(920px 520px at -18% 18%, rgba(78, 168, 209, 0.11), transparent 58%),
        linear-gradient(165deg, #08090d 0%, #0c0f15 42%, #090a0f 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.11;
      background-image:
        linear-gradient(transparent 95%, rgba(255, 255, 255, 0.12) 100%),
        linear-gradient(90deg, transparent 95%, rgba(255, 255, 255, 0.05) 100%);
      background-size: 100% 3px, 3px 100%;
      mix-blend-mode: soft-light;
    }
    .wrap {
      width: min(1280px, 94vw);
      margin: 26px auto 44px;
      position: relative;
      z-index: 1;
    }
    .hero {
      border-radius: 22px;
      padding: 26px 24px 20px;
      margin-bottom: 14px;
      background:
        linear-gradient(125deg, rgba(255, 107, 53, 0.2), rgba(255, 107, 53, 0.05) 40%, rgba(78, 168, 209, 0.16) 100%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }
    .hero-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }
    .kicker {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(236, 233, 227, 0.88);
      font-weight: 700;
    }
    .hero h1 {
      margin: 0;
      line-height: 1.04;
      letter-spacing: 0.01em;
      font-size: clamp(28px, 5vw, 58px);
      font-weight: 800;
      text-transform: uppercase;
      text-shadow: 0 8px 30px rgba(255, 107, 53, 0.28);
    }
    .hero h1 .sub {
      display: block;
      font-size: clamp(14px, 1.7vw, 20px);
      margin-top: 8px;
      color: rgba(236, 233, 227, 0.88);
      letter-spacing: 0.09em;
      font-weight: 600;
    }
    .hero p {
      margin: 0;
      color: rgba(196, 191, 183, 0.95);
      font-size: 13px;
      line-height: 1.65;
      max-width: 860px;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .chip {
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      font-size: 11px;
      color: rgba(196, 191, 183, 0.95);
      background: rgba(17, 19, 24, 0.72);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .chip b {
      color: #fff;
      margin-right: 6px;
      font-size: 13px;
      letter-spacing: 0;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.1fr auto 1fr;
      gap: 10px;
      align-items: center;
      margin: 14px 0 18px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(17, 19, 24, 0.86);
      box-shadow: var(--shadow);
    }
    .select, .search, .btn {
      width: 100%;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(180deg, #1b1f27, #141820);
      color: var(--ink);
      height: 42px;
      padding: 0 12px;
      font-size: 13px;
      outline: none;
    }
    .select:focus, .search:focus {
      border-color: rgba(255, 107, 53, 0.85);
      box-shadow: 0 0 0 2px rgba(255, 107, 53, 0.22);
    }
    .btn {
      width: 120px;
      background: linear-gradient(125deg, rgba(255, 107, 53, 0.94), rgba(78, 168, 209, 0.9));
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .btn:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background:
        linear-gradient(160deg, rgba(17, 19, 24, 0.96), rgba(25, 27, 34, 0.96)),
        radial-gradient(180px 120px at 100% 0, rgba(255, 107, 53, calc(var(--intensity, 0.25) * 0.28)), transparent 70%);
      padding: 14px 14px 13px;
      text-decoration: none;
      color: inherit;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: auto -20% -70% -20%;
      height: 120px;
      background: radial-gradient(circle, rgba(78, 168, 209, calc(var(--intensity, 0.2) * 0.24)), transparent 70%);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 107, 53, 0.66);
      box-shadow: 0 0 0 1px rgba(255, 107, 53, 0.24) inset, 0 20px 34px rgba(4, 13, 25, 0.6);
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin: 0 0 8px;
    }
    .sid {
      font-size: 12px;
      font-weight: 700;
      margin: 0;
      word-break: break-all;
      color: rgba(236, 233, 227, 0.95);
      letter-spacing: 0.02em;
    }
    .song-file {
      margin: 0 0 8px;
      font-size: 11px;
      color: rgba(185, 178, 169, 0.92);
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      flex: 0 0 auto;
      font-size: 11px;
      color: #fff;
      background: linear-gradient(130deg, rgba(255, 107, 53, 0.95), rgba(78, 168, 209, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 4px 8px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .summary {
      font-size: 12px;
      line-height: 1.55;
      color: rgba(236, 233, 227, 0.95);
      margin: 0 0 8px;
      min-height: 36px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meter {
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      margin-bottom: 9px;
    }
    .meter > span {
      display: block;
      height: 100%;
      width: calc(var(--meter, 40) * 1%);
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 107, 53, 0.95), rgba(78, 168, 209, 0.9));
    }
    .meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.72;
      letter-spacing: 0.02em;
    }
    .meta b {
      color: rgba(236, 233, 227, 0.96);
      font-weight: 700;
      margin-right: 4px;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .empty { color: var(--muted); font-size: 13px; padding: 18px 4px; }
    .stamp {
      margin-top: 14px;
      color: #6f7b90;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    @media (max-width: 880px) {
      .toolbar { grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .hero { padding: 20px 16px 16px; }
      .hero-top { display: block; }
      .hero h1 { font-size: clamp(26px, 10vw, 40px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="kicker">MV Orchestra</div>
          <h1>Session Hub<span class="sub">Direction Archive / Concept Explorer</span></h1>
        </div>
      </div>
      <p>セッションを選択すると `assets/instructions/index.html` に移動します。カードには楽曲ファイル名と企画内容の1行要約を表示します。</p>
      <div class="stats" id="stats"></div>
    </section>

    <section class="toolbar">
      <select class="select" id="session-select"></select>
      <button class="btn" id="open-btn">Open</button>
      <input class="search" id="search" type="search" placeholder="session id / 要約で検索" />
    </section>

    <section class="grid" id="grid"></section>
    <div class="empty" id="empty" style="display:none">該当セッションがありません。</div>
    <div class="stamp" id="stamp"></div>
  </div>

  <script src="./session_manifest.js"></script>
  <script>
    const SESSIONS = Array.isArray(window.SESSION_MANIFEST) ? window.SESSION_MANIFEST.slice() : [];

    function getSongFilename(session) {
      const direct = String(session?.song_file || session?.song_filename || "").trim();
      return direct || "-";
    }

    function fmtDate(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${da} ${hh}:${mm}`;
    }

    function fmtDur(v) {
      if (typeof v !== "number" || !Number.isFinite(v) || v <= 0) return "-";
      return `${Math.round(v * 10) / 10}s`;
    }

    function buildEntryUrl(session) {
      const sid = session?.session_id || "";
      const p = new URLSearchParams();
      p.set("sid", sid);
      return `./session-entry.html?${p.toString()}`;
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    const selectEl = document.getElementById("session-select");
    const gridEl = document.getElementById("grid");
    const emptyEl = document.getElementById("empty");
    const searchEl = document.getElementById("search");
    const openBtn = document.getElementById("open-btn");
    const statsEl = document.getElementById("stats");
    const stampEl = document.getElementById("stamp");

    function renderStats(list) {
      const total = list.length;
      const clips = list.reduce((a, x) => a + (Number.isFinite(x.clip_count) ? x.clip_count : 0), 0);
      const avg = total > 0 ? (clips / total) : 0;
      const max = list.reduce((m, x) => Math.max(m, Number.isFinite(x.clip_count) ? x.clip_count : 0), 0);
      statsEl.innerHTML = [
        `<span class="chip"><b>${total}</b>sessions</span>`,
        `<span class="chip"><b>${clips}</b>total clips</span>`,
        `<span class="chip"><b>${avg.toFixed(1)}</b>avg clips</span>`,
        `<span class="chip"><b>${max}</b>peak clips</span>`
      ].join("");
    }

    function renderSelect(list) {
      selectEl.innerHTML = list.map(s => `<option value="${escapeHtml(buildEntryUrl(s))}">${escapeHtml(s.session_id)} | ${escapeHtml(getSongFilename(s))}</option>`).join("");
    }

    function renderGrid(list) {
      if (!list.length) {
        gridEl.innerHTML = "";
        emptyEl.style.display = "block";
        return;
      }
      emptyEl.style.display = "none";
      gridEl.innerHTML = list.map(s => {
        const clips = Number.isFinite(s.clip_count) ? s.clip_count : 0;
        const intensity = Math.max(0.05, Math.min(1, clips / 100));
        const meter = Math.max(10, Math.min(100, clips));
        const entryUrl = buildEntryUrl(s);
        return `
        <a class="card" href="${escapeHtml(entryUrl)}" style="--intensity:${intensity};--meter:${meter}">
          <div class="card-head">
            <div class="sid">${escapeHtml(s.session_id)}</div>
            <div class="badge">${escapeHtml(clips > 0 ? `${clips} clips` : "no clips")}</div>
          </div>
          <div class="song-file">♪ ${escapeHtml(getSongFilename(s))}</div>
          <div class="summary">${escapeHtml(s.summary || "-")}</div>
          <div class="meter"><span></span></div>
          <div class="meta">
            <div><b>generated</b> ${escapeHtml(fmtDate(s.generated_at))}</div>
            <div><b>clips</b> ${escapeHtml(Number.isFinite(s.clip_count) ? String(s.clip_count) : "-")}</div>
            <div><b>duration</b> ${escapeHtml(fmtDur(s.duration_sec))}</div>
            <div><b>sections</b> ${escapeHtml(Number.isFinite(s.section_count) ? String(s.section_count) : "-")}</div>
          </div>
        </a>
      `;
      }).join("");
    }

    function applyFilter() {
      const q = (searchEl.value || "").trim().toLowerCase();
      const filtered = q
        ? SESSIONS.filter(s => (`${s.session_id || ""} ${getSongFilename(s)} ${s.summary || ""}`).toLowerCase().includes(q))
        : SESSIONS;
      renderSelect(filtered);
      renderGrid(filtered);
      renderStats(filtered);
    }

    openBtn.addEventListener("click", () => {
      const p = selectEl.value;
      if (p) location.href = p;
    });

    selectEl.addEventListener("change", () => {
      const p = selectEl.value;
      if (p) location.hash = `session=${encodeURIComponent(p)}`;
    });

    searchEl.addEventListener("input", applyFilter);

    const now = new Date();
    stampEl.textContent = `updated: ${now.toLocaleString()}`;

    applyFilter();
  </script>
</body>
</html>
