<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MV Sessions</title>
  <style>
    :root {
      --bg: #0a0b0e;
      --ink: #ece9e3;
      --muted: #b9b2a9;
      --line: rgba(255, 255, 255, 0.12);
      --panel: #111318;
      --panel-2: #191b22;
      --accent: #ff6b35;
      --accent-2: #4ea8d1;
      --ok: #34d399;
      --danger: #f87171;
      --radius: 16px;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      background:
        radial-gradient(1100px 680px at 102% -12%, rgba(255, 107, 53, 0.2), transparent 55%),
        radial-gradient(920px 520px at -18% 18%, rgba(78, 168, 209, 0.11), transparent 58%),
        linear-gradient(165deg, #08090d 0%, #0c0f15 42%, #090a0f 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.11;
      background-image:
        linear-gradient(transparent 95%, rgba(255, 255, 255, 0.12) 100%),
        linear-gradient(90deg, transparent 95%, rgba(255, 255, 255, 0.05) 100%);
      background-size: 100% 3px, 3px 100%;
      mix-blend-mode: soft-light;
    }
    .wrap {
      width: min(1280px, 94vw);
      margin: 26px auto 44px;
      position: relative;
      z-index: 1;
    }
    .hero {
      border-radius: 22px;
      padding: 26px 24px 20px;
      margin-bottom: 14px;
      background:
        linear-gradient(125deg, rgba(255, 107, 53, 0.2), rgba(255, 107, 53, 0.05) 40%, rgba(78, 168, 209, 0.16) 100%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }
    .hero-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
    }
    .kicker {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(236, 233, 227, 0.88);
      font-weight: 700;
    }
    .hero h1 {
      margin: 0;
      line-height: 1.04;
      letter-spacing: 0.01em;
      font-size: clamp(28px, 5vw, 58px);
      font-weight: 800;
      text-transform: uppercase;
      text-shadow: 0 8px 30px rgba(255, 107, 53, 0.28);
    }
    .hero h1 .sub {
      display: block;
      font-size: clamp(14px, 1.7vw, 20px);
      margin-top: 8px;
      color: rgba(236, 233, 227, 0.88);
      letter-spacing: 0.09em;
      font-weight: 600;
    }
    .hero p {
      margin: 0;
      color: rgba(196, 191, 183, 0.95);
      font-size: 13px;
      line-height: 1.65;
      max-width: 860px;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
    .chip {
      padding: 7px 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      font-size: 11px;
      color: rgba(196, 191, 183, 0.95);
      background: rgba(17, 19, 24, 0.72);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .chip b {
      color: #fff;
      margin-right: 6px;
      font-size: 13px;
      letter-spacing: 0;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1.1fr auto 1fr;
      gap: 10px;
      align-items: center;
      margin: 14px 0 18px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(17, 19, 24, 0.86);
      box-shadow: var(--shadow);
    }
    .select, .search, .btn {
      width: 100%;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: linear-gradient(180deg, #1b1f27, #141820);
      color: var(--ink);
      height: 42px;
      padding: 0 12px;
      font-size: 13px;
      outline: none;
    }
    .select:focus, .search:focus {
      border-color: rgba(255, 107, 53, 0.85);
      box-shadow: 0 0 0 2px rgba(255, 107, 53, 0.22);
    }
    .btn {
      width: 120px;
      background: linear-gradient(125deg, rgba(255, 107, 53, 0.94), rgba(78, 168, 209, 0.9));
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .btn:hover {
      filter: brightness(1.04);
      transform: translateY(-1px);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background:
        linear-gradient(160deg, rgba(17, 19, 24, 0.96), rgba(25, 27, 34, 0.96)),
        radial-gradient(180px 120px at 100% 0, rgba(255, 107, 53, calc(var(--intensity, 0.25) * 0.28)), transparent 70%);
      padding: 14px 14px 13px;
      text-decoration: none;
      color: inherit;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: auto -20% -70% -20%;
      height: 120px;
      background: radial-gradient(circle, rgba(78, 168, 209, calc(var(--intensity, 0.2) * 0.24)), transparent 70%);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 107, 53, 0.66);
      box-shadow: 0 0 0 1px rgba(255, 107, 53, 0.24) inset, 0 20px 34px rgba(4, 13, 25, 0.6);
    }
    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin: 0 0 8px;
    }
    .sid {
      font-size: 12px;
      font-weight: 700;
      margin: 0;
      word-break: break-all;
      color: rgba(236, 233, 227, 0.95);
      letter-spacing: 0.02em;
    }
    .song-file {
      margin: 0 0 8px;
      font-size: 11px;
      color: rgba(185, 178, 169, 0.92);
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge {
      flex: 0 0 auto;
      font-size: 11px;
      color: #fff;
      background: linear-gradient(130deg, rgba(255, 107, 53, 0.95), rgba(78, 168, 209, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 4px 8px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .summary {
      font-size: 12px;
      line-height: 1.55;
      color: rgba(236, 233, 227, 0.95);
      margin: 0 0 8px;
      min-height: 36px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meter {
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      margin-bottom: 9px;
    }
    .meter > span {
      display: block;
      height: 100%;
      width: calc(var(--meter, 40) * 1%);
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 107, 53, 0.95), rgba(78, 168, 209, 0.9));
    }
    .meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.72;
      letter-spacing: 0.02em;
    }
    .meta b {
      color: rgba(236, 233, 227, 0.96);
      font-weight: 700;
      margin-right: 4px;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .empty { color: var(--muted); font-size: 13px; padding: 18px 4px; }
    .stamp {
      margin-top: 14px;
      color: #6f7b90;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    @media (max-width: 880px) {
      .toolbar { grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .hero { padding: 20px 16px 16px; }
      .hero-top { display: block; }
      .hero h1 { font-size: clamp(26px, 10vw, 40px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-top">
        <div>
          <div class="kicker">MV Orchestra</div>
          <h1>Session Hub<span class="sub">Direction Archive / Concept Explorer</span></h1>
        </div>
      </div>
      <p>セッションを選択すると `assets/instructions/index.html` に移動します。カードには楽曲ファイル名と企画内容の1行要約を表示します。</p>
      <div class="stats" id="stats"></div>
    </section>

    <section class="toolbar">
      <select class="select" id="session-select"></select>
      <button class="btn" id="open-btn">Open</button>
      <input class="search" id="search" type="search" placeholder="session id / 要約で検索" />
    </section>

    <section class="grid" id="grid"></section>
    <div class="empty" id="empty" style="display:none">該当セッションがありません。</div>
    <div class="stamp" id="stamp"></div>
  </div>

  <script src="./session_manifest.js"></script>
  <script>
    const SESSIONS = Array.isArray(window.SESSION_MANIFEST) ? window.SESSION_MANIFEST.slice() : [];

    function getSongFilename(session) {
      const direct = String(session?.song_file || session?.song_filename || "").trim();
      return direct || "-";
    }

    function fmtDate(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${da} ${hh}:${mm}`;
    }

    function fmtDur(v) {
      if (typeof v !== "number" || !Number.isFinite(v) || v <= 0) return "-";
      return `${Math.round(v * 10) / 10}s`;
    }

    function buildEntryUrl(session) {
      const sid = session?.session_id || "";
      const p = new URLSearchParams();
      p.set("sid", sid);
      return `./session-entry.html?${p.toString()}`;
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
    }

    const selectEl = document.getElementById("session-select");
    const gridEl = document.getElementById("grid");
    const emptyEl = document.getElementById("empty");
    const searchEl = document.getElementById("search");
    const openBtn = document.getElementById("open-btn");
    const statsEl = document.getElementById("stats");
    const stampEl = document.getElementById("stamp");

    function renderStats(list) {
      const total = list.length;
      const clips = list.reduce((a, x) => a + (Number.isFinite(x.clip_count) ? x.clip_count : 0), 0);
      const avg = total > 0 ? (clips / total) : 0;
      const max = list.reduce((m, x) => Math.max(m, Number.isFinite(x.clip_count) ? x.clip_count : 0), 0);
      statsEl.innerHTML = [
        `<span class="chip"><b>${total}</b>sessions</span>`,
        `<span class="chip"><b>${clips}</b>total clips</span>`,
        `<span class="chip"><b>${avg.toFixed(1)}</b>avg clips</span>`,
        `<span class="chip"><b>${max}</b>peak clips</span>`
      ].join("");
    }

    function renderSelect(list) {
      selectEl.innerHTML = list.map(s => `<option value="${escapeHtml(buildEntryUrl(s))}">${escapeHtml(s.session_id)} | ${escapeHtml(getSongFilename(s))}</option>`).join("");
    }

    function renderGrid(list) {
      if (!list.length) {
        gridEl.innerHTML = "";
        emptyEl.style.display = "block";
        return;
      }
      emptyEl.style.display = "none";
      gridEl.innerHTML = list.map(s => {
        const clips = Number.isFinite(s.clip_count) ? s.clip_count : 0;
        const intensity = Math.max(0.05, Math.min(1, clips / 100));
        const meter = Math.max(10, Math.min(100, clips));
        const entryUrl = buildEntryUrl(s);
        return `
        <a class="card" href="${escapeHtml(entryUrl)}" style="--intensity:${intensity};--meter:${meter}">
          <div class="card-head">
            <div class="sid">${escapeHtml(s.session_id)}</div>
            <div class="badge">${escapeHtml(clips > 0 ? `${clips} clips` : "no clips")}</div>
          </div>
          <div class="song-file">♪ ${escapeHtml(getSongFilename(s))}</div>
          <div class="summary">${escapeHtml(s.summary || "-")}</div>
          <div class="meter"><span></span></div>
          <div class="meta">
            <div><b>generated</b> ${escapeHtml(fmtDate(s.generated_at))}</div>
            <div><b>clips</b> ${escapeHtml(Number.isFinite(s.clip_count) ? String(s.clip_count) : "-")}</div>
            <div><b>duration</b> ${escapeHtml(fmtDur(s.duration_sec))}</div>
            <div><b>sections</b> ${escapeHtml(Number.isFinite(s.section_count) ? String(s.section_count) : "-")}</div>
          </div>
        </a>
      `;
      }).join("");
    }

    function applyFilter() {
      const q = (searchEl.value || "").trim().toLowerCase();
      const filtered = q
        ? SESSIONS.filter(s => (`${s.session_id || ""} ${getSongFilename(s)} ${s.summary || ""}`).toLowerCase().includes(q))
        : SESSIONS;
      renderSelect(filtered);
      renderGrid(filtered);
      renderStats(filtered);
    }

    openBtn.addEventListener("click", () => {
      const p = selectEl.value;
      if (p) location.href = p;
    });

    selectEl.addEventListener("change", () => {
      const p = selectEl.value;
      if (p) location.hash = `session=${encodeURIComponent(p)}`;
    });

    searchEl.addEventListener("input", applyFilter);

    const now = new Date();
    stampEl.textContent = `updated: ${now.toLocaleString()}`;

    applyFilter();
  </script>

<noscript>
<section style="margin:14px 0 0 0;padding:14px;border:1px solid rgba(255,255,255,.16);border-radius:14px;background:rgba(12,14,20,.78)">
<h2 style="margin:0 0 8px 0;font-size:16px;color:#f3f5fa">Published Sessions (No-JS View)</h2>
<p style="margin:0 0 12px 0;font-size:12px;color:#aab6c8">JavaScriptを実行しない環境向けの一覧です。</p>
<ul style="list-style:none;margin:0;padding:0">
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260321-112701-c82a" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260321-112701-c82a</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ Funky Gyoza Breakbeat.mp3 / clips: 72</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">台所は儀式場だ——そこに、煤けた肌と異様に長い指を持つ鴉が現れる。フライパン、まな板、石臼、すべての道具が楽器になり、鴉は演奏する。指がビートを刻むたびに眠れる食材が目を覚まし、自律的に形を整えながら音楽に溶け込む。カメラは万華鏡のように割れ、鴉の長い指が六方向に複製され、台所全体がひとつのバンドセッションになる。しかし——右手だけが映らない。石の首飾りが揺れるたびに「誰が調理を始めたのか」という問いがノイズのように画面を侵食し始める…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260321-000337-db54" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260321-000337-db54</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ Melty_Sky.mp3 / clips: 82</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">深夜の魔法の森で、古木の幹の穴から蛍が一匹ずつ無音で落下し続けている。blue-white発光苔の絨毯の上に仰向けに寝転んだ足枷の狐は、ものすごく真剣な顔で落下する光を口で受け止めようとして次々と外す——コメディだ。狐が蛍を外すたびに、遠景のpink-teal苔密集帯がぱっと一箇所点灯する：忘却が苔に染み込んだ証拠。その連鎖を草ぶき小屋の外で子どもが膝上の粘土板に点として刻み続けるが、苔の点灯速度が倍になるにつれ粘土板の余白が尽き、子…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260320-105804-a762" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260320-105804-a762</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ グラスチャイムの影.mp3 / clips: 77</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">夜の台所。ポラロイドカメラが一枚ずつ、工程を撮り続けている。石橋の欄干で拾った乾燥した花びら、焚き火跡の灰を少量、白紙に書いては消した言葉の代わりに並べられた香辛料——材料は感情の残滓から選ばれている。画面の中央には、コートの背中だけが見える人物。顔は永遠に映らない。石臼で何かを砕く右手の動きが、音楽の拍に合わせてゆっくりと展開していく。蛇腹関節を持つ蝶が一羽、カウンターの端に静止している。翅は開かない。 工程が進むにつれ、ポラロイド…</div></li>

<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260311-122757-1663" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260311-122757-1663</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ 届くかどうかはわからなくても.mp3 / clips: 62</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">音が物質として流通するこの街で、巫女の少女は「未精製の歌声」を密かに抱えている。彼女の細い腰には粗鉱扱いの音が溜まりすぎていて、骨の首飾りだけがその重さを測るように揺れている。魔導塔が一定リズムで鳴き続ける夜、彼女は誰もいない石臼の前で止まる——砕けば光になる、でも砕いたら「それ」ではなくなる。尖った耳が街のビートを拾うたびに、指先だけが宙で止まっている。 物語の軸は「放出か、保持か」の一点に絞られる。歌声を光柱に投入すれば爆発する、…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260311-014535-cf0f" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260311-014535-cf0f</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ 届くかどうかはわからなくても.mp3 / clips: 61</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">磁気レールが三次元に蜘蛛の巣を張る高速商業都市で、王冠を被った大目玉のタコ——タコタコ王——は毎日外周ルートの安値競売しか取れない零細屋台主として「気持ち」を詰めた謎の缶詰を積んでいる。赤く鈍く点滅する浮遊標識だけが彼女の存在を示し、青白く高速点滅する上層の標識群との色の格差が、画面の奥から手前へいつも圧力をかけている。走行中の屋台荷台では手書き設計図の空白ノード「???」だけが毎日埋まらないまま磁気レールの振動に揺れている。転機は上…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260310-172135-69e8" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260310-172135-69e8</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ 届くかどうかはわからなくても.mp3 / clips: 45</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">感情が物理的な質量を持つ管理社会の城郭の片隅で、割れた王冠を頭に戴いた鶴の異形貴族がひとり、水門の制御盤の前に立っている。かつては城の感情流量を統括する水門官だったこの存在は、今や失権し、そのシンボルである王冠はひび割れたままだ。鶴は自分の感情だけを誰にも放流させずに抱え込んでいる——管理する側だったから、自分が管理される側に回る術を知らないまま。 城郭の壁面に刻まれた流量計の目盛りは、鶴の感情強度が臨界値に近づくたびに少しずつ赤く染…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260310-093958-b9fd" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260310-093958-b9fd</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ 届けたい温度.mp3 / clips: 65</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">感情が水として体外に滲み出るこの世界で、細長い首と複眼を持つ修道士が一人、船着き場の係留杭の根元に膝をついている。彼の足元には黒い水たまりが広がっているが、その水たまりは彼のものではない——誰かが死んだ夜にここへ流れ込んだ悲しみの残滓だ。修道士は古い頭冠をわずかに傾け、その残滓に右手の指先をゆっくりと近づける。触れるか触れないかの瞬間、複眼のひとつが閉じる。 彼が「届けたい」と思っているのは感情ではない——感情を持たないことへの、静か…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260309-230141-f307" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260309-230141-f307</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ 蛍光灯が瞬く 深夜のオフィス.mp3 / clips: 56</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">感情が採掘・売買されるディストピアの都市。男は二十年以上、自分の怒りや悲しみを送電網へ供給し続けてきた「優良納税者」だった。深夜のオフィス廊下に立つ彼の提灯は、かつて赤や青に激しく揺れていた——しかし今夜、それは色を失いかけている。自販機の前で止まった人差し指は、選択肢を拒んでいるのではない。感情残量が底をつき、「飲みたい」という欲求そのものが消えかけているのだ。監視カメラが虹色に点滅し、「感情過少警報」を静かに発信する。 道化師が現…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260302-130453-4a87" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260302-130453-4a87</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ わからないから.mp3 / clips: 67</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">ぬらりひょんが画面と現実の境界に物理的に挟まることで、少年の参照依存を視覚化する。街の感情音に接続できない部屋の静寂が少年の内側に蓄積した音圧の証拠となり、画面消去が唯一の排出口として機能する。 目標は画面を消した後も少年の体が踊り続けるかどうか——その一点に向けて3分半を費やす。答えが出た瞬間、喜びか恐怖か判別できない設計。 深夜の6畳間。少年が教科書タワーのスマートフォンで自撮り動画を再生する。部屋だけが静寂——街の感情音が届かな…</div></li>

<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260309-000620-e5a8" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260309-000620-e5a8</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ 問いの果て.mp3 / clips: 44</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">体温が通貨として流通する石の街で、鎖の首輪をつけたイカ型の存在が夜の書斎に独り座り、燧石山から持ち帰った火打石を触手で転がしながら過去を反芻する。長老として何十年も熱を与え続けてきたはずが、体温計の数値はじわじわと下がり続けており、採掘権者への熱の横流しという疑念が燭台の灯りの下で輪郭を持ち始める。城壁階段に埋まった石人の顔をかつて知っていた——その記憶が問いに変わったとき、飲み干した杯を棚に戻そうとして外し、床に落とし、触手で拾い直…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260308-124023-e4c5" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260308-124023-e4c5</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ 問いの果て.mp3 / clips: 53</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">深夜の書斎に道化師の男が一人でいる。天井まで届く本棚の前に座り、足元には空の茶碗、縫い目首輪だけが電気スタンド一灯の暖色光に浮かぶ——その首輪が「かつて何かを閉じ込めた証」であることを、男は知っている。男は本棚に向かって口を動かし続けているが、声は出ない。「答えを知っている顔」を長年演じてきた痕跡が首元に刻まれたまま、誰も見ていない部屋でだけ、その仮面が少しずつ剥がれていく。映像の中盤、地平線に煙の出ない鍛造炉が並ぶ集落の遠景が挿入さ…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260308-013221-7d56" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260308-013221-7d56</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ オブラーテッド.mp3 / clips: 68</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">追跡行為を通じて喪失の痛みを具体物で連結し、視聴者の問いを維持する。 目標は追跡対象の所在を突き止め、問いの答えを画面で回収する。 錆びた鍵穴を見つめる主役の手元を提示する。 連絡橋で気配だけが先行し姿が見えない状態を作る。 配電室で火花と水滴が衝突し進路が一つに絞られる。 管理室の監視映像で対象の所在が明示される。 屋上通路で問いの答えが画面内の具体物として示される。</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260307-140450-2d08" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260307-140450-2d08</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ オブラーテッド.mp3 / clips: 91</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">地下通路の鉄扉前で主役が立ち止まり、錆びた鍵穴の奥に赤い反射を見つける。その瞬間から追跡が始まる——誰かがここを通ったことを示す濡れた足跡が扉の先へ続いていた。点滅する蛍光灯が照らす連絡橋を走り抜ける中、気配だけが先行し姿は見えない。配電室で火花と水滴が衝突する危険な状況の中、主役は電源を再投入し進むべき経路を一点に絞る。逆光の非常階段を上りながら迷いが断ち切られ、決断が加速する。管理室のモニターに映し出された遅延した監視映像が、探し…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260302-010721-f35d" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260302-010721-f35d</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ わからないから.mp3 / clips: 60</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">仮面という削除不可能な「偽物」が、記憶の堆積する都市を歩くことで自分の記憶だけが刻まれない逆説に辿り着く。 目標は「偽物の自分を削除しようとして削除しきれなかった」という失敗を、世界観の逆転（光らない足跡）によって静かな肯定に変換する。 鉄の仮面のろくろ首が記憶の堆積する夜の石畳を一人で歩く——首が触れるたびに他者の記憶が流れ込み、自分の輪郭が溶ける。 流れ込む無数の他者の記憶の中で、ろくろ首は自分固有の記憶を持っているのかを問い始め…</div></li>
<li style="margin:0 0 10px 0;padding:10px 12px;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(10,12,18,.55)"><a href="./session-entry.html?sid=session-20260228-125332-4fa2" style="color:#ffb28f;font-weight:700;text-decoration:none">session-20260228-125332-4fa2</a><div style="margin-top:4px;color:#9fb1c8;font-size:12px">♪ わからないから.mp3 / clips: 52</div><div style="margin-top:6px;color:#d8dde8;font-size:12px;line-height:1.5">魔導回路が動かす秩序の末端で、蛾の人型が球体関節を軋ませながら壊れていく——その崩壊の跡だけが、回路の設計図に記録されない本物の痕跡として残る。 目標は蛾の人型の肘当てが完全に砕け、その破片が石畳の回路に取り込まれた瞬間を目撃する。 夜明け前の埠頭で蛾の人型が荷揚げ滑車の鎖に翼を引っかけたまま静止している。石畳の継ぎ目から青白い光が漏れ、球体関節が微かに軋む。 ひび割れ肘当てを前方へ押し出す反復動作が、周囲の滑車と歯車の回転と微妙にず…</div></li>
